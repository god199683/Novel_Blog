<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소개 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="about-hero about-hero-full">
            <h1>Novel_Blog 소개</h1>
            <p>당신의 이야기가 세상과 만나는 곳</p>
            <a href="#" class="btn-primary" id="start-btn" style="margin-top: 2rem;">시작하기</a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('start-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'write.html';
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
