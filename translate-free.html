<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무료 번역 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .translate-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: calc(100vh - 120px); }
        .translate-toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #e8f2fb; background: #f7fbff; flex-shrink: 0; flex-wrap: wrap; }
        .translate-toolbar label { font-size: 0.82rem; color: #5a7a9a; }
        .translate-toolbar select { border: 1px solid #d0e3f2; border-radius: 6px; padding: 5px 10px; font-size: 0.85rem; color: #2c3e50; background: #fff; outline: none; }
        .translate-btn { padding: 6px 20px; border: none; border-radius: 6px; background: #3a9ad9; color: #fff; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
        .translate-btn:hover { background: #2a7ab9; }
        .translate-btn:disabled { background: #b0cbde; cursor: not-allowed; }
        .swap-btn { padding: 4px 10px; border: 1px solid #d0e3f2; border-radius: 6px; background: #fff; color: #5a7a9a; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
        .swap-btn:hover { background: #e8f2fb; }
        .translate-panels { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        .translate-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .translate-panel + .translate-panel { border-left: 1px solid #e8f2fb; }
        .translate-panel-header { padding: 8px 16px; font-size: 0.82rem; color: #5a7a9a; background: #f7fbff; border-bottom: 1px solid #e8f2fb; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .translate-panel-body { flex: 1; overflow-y: auto; padding: 16px; }
        .translate-panel-body textarea { width: 100%; height: 100%; border: none; outline: none; resize: none; font-size: 10.5pt; line-height: 1.9; color: #2c3e50; font-family: inherit; }
        .translate-result { font-size: 10.5pt; line-height: 1.9; color: #2c3e50; white-space: pre-wrap; word-break: break-word; min-height: 100%; }
        .translate-copy-btn { padding: 4px 10px; border: 1px solid #d0e3f2; border-radius: 4px; background: #fff; color: #5a7a9a; font-size: 0.78rem; cursor: pointer; }
        .translate-copy-btn:hover { background: #e8f2fb; }
        .translate-clear-btn { padding: 4px 10px; border: 1px solid #d0e3f2; border-radius: 4px; background: #fff; color: #5a7a9a; font-size: 0.78rem; cursor: pointer; }
        .translate-clear-btn:hover { background: #e8f2fb; }
        .translate-status { font-size: 0.78rem; color: #7a9ab5; padding: 4px 16px; border-top: 1px solid #e8f2fb; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .translate-char-count { font-size: 0.75rem; color: #b0cbde; }
        .translate-link { font-size: 0.75rem; color: #3a9ad9; text-decoration: none; }
        .translate-link:hover { text-decoration: underline; }
    </style>
</head>
<body class="write-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <nav class="page-nav">
            <a href="write.html" class="page-nav-item">작성</a>
            <a href="viewer.html" class="page-nav-item">뷰어</a>
            <a href="manage.html" class="page-nav-item">관리</a>
            <a href="translate.html" class="page-nav-item">DeepL</a>
            <a href="translate-free.html" class="page-nav-item active">무료 번역</a>
            <a href="translate-pro.html" class="page-nav-item">프로 번역</a>
        </nav>
        <section class="translate-section">
            <div class="translate-toolbar">
                <label>원본:</label>
                <select id="source-lang">
                    <option value="auto" selected>자동 감지</option>
                    <option value="ko">한국어</option>
                    <option value="en">영어</option>
                    <option value="ja">일본어</option>
                    <option value="zh-CN">중국어 (간체)</option>
                    <option value="zh-TW">중국어 (번체)</option>
                    <option value="de">독일어</option>
                    <option value="fr">프랑스어</option>
                    <option value="es">스페인어</option>
                    <option value="pt">포르투갈어</option>
                    <option value="ru">러시아어</option>
                    <option value="it">이탈리아어</option>
                    <option value="vi">베트남어</option>
                    <option value="th">태국어</option>
                    <option value="id">인도네시아어</option>
                    <option value="ar">아랍어</option>
                    <option value="hi">힌디어</option>
                </select>
                <button class="swap-btn" id="swap-btn" title="언어 교환">⇄</button>
                <label>번역:</label>
                <select id="target-lang">
                    <option value="en" selected>영어</option>
                    <option value="ko">한국어</option>
                    <option value="ja">일본어</option>
                    <option value="zh-CN">중국어 (간체)</option>
                    <option value="zh-TW">중국어 (번체)</option>
                    <option value="de">독일어</option>
                    <option value="fr">프랑스어</option>
                    <option value="es">스페인어</option>
                    <option value="pt">포르투갈어</option>
                    <option value="ru">러시아어</option>
                    <option value="it">이탈리아어</option>
                    <option value="vi">베트남어</option>
                    <option value="th">태국어</option>
                    <option value="id">인도네시아어</option>
                    <option value="ar">아랍어</option>
                    <option value="hi">힌디어</option>
                </select>
                <button class="translate-btn" id="translate-btn">번역</button>
            </div>

            <div class="translate-panels">
                <div class="translate-panel">
                    <div class="translate-panel-header">
                        <span>원문 <span class="translate-char-count" id="source-count">0자</span></span>
                        <button class="translate-clear-btn" id="clear-btn">지우기</button>
                    </div>
                    <div class="translate-panel-body">
                        <textarea id="source-text" placeholder="번역할 텍스트를 입력하세요..."></textarea>
                    </div>
                </div>
                <div class="translate-panel">
                    <div class="translate-panel-header">
                        <span>번역 결과</span>
                        <button class="translate-copy-btn" id="copy-result-btn">복사</button>
                    </div>
                    <div class="translate-panel-body">
                        <div class="translate-result" id="result-text">번역 결과가 여기에 표시됩니다.</div>
                    </div>
                </div>
            </div>

            <div class="translate-status">
                <span id="translate-status">API 키 없이 무료 번역 (Google Translate 기반)</span>
                <a href="translate.html" class="translate-link">DeepL 번역 →</a>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
        })();

        const sourceText = document.getElementById('source-text');
        const resultText = document.getElementById('result-text');
        const translateBtn = document.getElementById('translate-btn');
        const statusEl = document.getElementById('translate-status');
        const copyResultBtn = document.getElementById('copy-result-btn');
        const clearBtn = document.getElementById('clear-btn');
        const swapBtn = document.getElementById('swap-btn');
        const sourceCount = document.getElementById('source-count');

        // 글자 수 표시
        sourceText.addEventListener('input', () => {
            sourceCount.textContent = sourceText.value.length.toLocaleString() + '자';
        });

        // 지우기
        clearBtn.addEventListener('click', () => {
            sourceText.value = '';
            resultText.textContent = '번역 결과가 여기에 표시됩니다.';
            sourceCount.textContent = '0자';
            statusEl.textContent = 'API 키 없이 무료 번역 (Google Translate 기반)';
        });

        // 언어 교환
        swapBtn.addEventListener('click', () => {
            const srcLang = document.getElementById('source-lang');
            const tgtLang = document.getElementById('target-lang');
            if (srcLang.value === 'auto') return;
            const tmp = srcLang.value;
            srcLang.value = tgtLang.value;
            tgtLang.value = tmp;
            // 텍스트도 교환
            if (resultText.textContent && resultText.textContent !== '번역 결과가 여기에 표시됩니다.' && resultText.textContent.indexOf('번역 실패') === -1) {
                const tmpText = sourceText.value;
                sourceText.value = resultText.textContent;
                resultText.textContent = tmpText;
                sourceCount.textContent = sourceText.value.length.toLocaleString() + '자';
            }
        });

        // Ctrl+Enter로 번역
        sourceText.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                translateBtn.click();
            }
        });

        // Google Translate 비공식 API로 번역
        async function translateChunk(text, srcLang, tgtLang) {
            const url = 'https://translate.googleapis.com/translate_a/single?client=gtx'
                + '&sl=' + encodeURIComponent(srcLang)
                + '&tl=' + encodeURIComponent(tgtLang)
                + '&dt=t'
                + '&q=' + encodeURIComponent(text);

            const response = await fetch(url);
            if (!response.ok) throw new Error('번역 요청 실패 (' + response.status + ')');

            const data = await response.json();
            let translated = '';
            if (data && data[0]) {
                for (let i = 0; i < data[0].length; i++) {
                    if (data[0][i] && data[0][i][0]) {
                        translated += data[0][i][0];
                    }
                }
            }
            return translated;
        }

        // 번역 실행
        translateBtn.addEventListener('click', async () => {
            const text = sourceText.value.trim();
            if (!text) { alert('번역할 텍스트를 입력하세요.'); return; }

            const srcLang = document.getElementById('source-lang').value;
            const tgtLang = document.getElementById('target-lang').value;

            translateBtn.disabled = true;
            translateBtn.textContent = '번역 중...';
            statusEl.textContent = '번역 요청 중...';
            resultText.textContent = '';

            try {
                // 5000자 단위로 분할
                const chunks = [];
                const maxLen = 4500;
                let remaining = text;
                while (remaining.length > 0) {
                    if (remaining.length <= maxLen) {
                        chunks.push(remaining);
                        break;
                    }
                    let cutAt = remaining.lastIndexOf('\n', maxLen);
                    if (cutAt < maxLen * 0.3) {
                        cutAt = remaining.lastIndexOf('. ', maxLen);
                        if (cutAt < maxLen * 0.3) cutAt = maxLen;
                        else cutAt += 1;
                    }
                    chunks.push(remaining.substring(0, cutAt));
                    remaining = remaining.substring(cutAt).trimStart();
                }

                let fullResult = '';
                for (let i = 0; i < chunks.length; i++) {
                    statusEl.textContent = '번역 중... (' + (i + 1) + '/' + chunks.length + ')';
                    const translated = await translateChunk(chunks[i], srcLang, tgtLang);
                    fullResult += translated;
                    // 중간 결과 표시
                    resultText.textContent = fullResult;
                    // 요청 간격
                    if (i < chunks.length - 1) await new Promise(r => setTimeout(r, 300));
                }

                statusEl.textContent = '번역 완료 (원문 ' + text.length.toLocaleString() + '자 → 번역 ' + fullResult.length.toLocaleString() + '자)';
            } catch (e) {
                resultText.textContent = '번역 실패: ' + e.message;
                statusEl.textContent = '번역 실패';
            }

            translateBtn.disabled = false;
            translateBtn.textContent = '번역';
        });

        // 결과 복사
        copyResultBtn.addEventListener('click', () => {
            const text = resultText.textContent;
            if (!text || text === '번역 결과가 여기에 표시됩니다.') return;
            navigator.clipboard.writeText(text).then(() => {
                copyResultBtn.textContent = '복사됨!';
                setTimeout(() => { copyResultBtn.textContent = '복사'; }, 1500);
            });
        });
    </script>
</body>
</html>
