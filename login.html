<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel-Blog : 로그인</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body class="auth-page">
    <div class="login-container">
        <header class="auth-header">
            <h1 class="logo">Novel-Blog</h1>
            <p>다시 오신 것을 환영합니다.</p>
        </header>

        <form id="login-form" class="auth-form">
            <div class="input-group">
    <label for="username">아이디</label>
    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
</div>

<div class="input-group">
    <label for="password">패스워드</label>
    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
</div>

            <button type="submit" class="btn btn-primary btn-full">로그인</button>
            
            <div class="auth-footer">
                <span>계정이 없으신가요?</span>
                <a href="signup.html" class="link-signup">회원가입</a>
            </div>
        </form>
    </div>
</body>
</html>
