<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card">
                <h2>로그인</h2>
                <p class="auth-subtitle">Novel_Blog에 오신 것을 환영합니다</p>

                <div id="error-message" class="error-message" style="display:none;"></div>
                <div id="success-message" class="success-message" style="display:none;"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="user-id">아이디</label>
                        <input type="text" id="user-id" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="비밀번호 표시">
                                <svg class="eye-icon" id="eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a9ab5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                <svg class="eye-icon" id="eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3a9ad9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary auth-btn" id="login-btn">로그인</button>
                </form>

                <div class="auth-divider">
                    <span>또는</span>
                </div>

                <button class="btn-social google-btn" id="google-login">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                    Google로 로그인
                </button>

                <p class="auth-footer">
                    계정이 없으신가요? <a href="signup.html">회원가입</a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Novel_Blog Project. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const pwInput = document.getElementById('password');
            const eyeOff = document.getElementById('eye-off');
            const eyeOn = document.getElementById('eye-on');
            const isHidden = pwInput.type === 'password';
            pwInput.type = isHidden ? 'text' : 'password';
            eyeOff.style.display = isHidden ? 'none' : 'block';
            eyeOn.style.display = isHidden ? 'block' : 'none';
        });

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const loginBtn = document.getElementById('login-btn');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.textContent = '로그인 중...';

            const userId = document.getElementById('user-id').value;
            const password = document.getElementById('password').value;
            const email = userId + '@novelblog.user';

            const { data, error } = await sb.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                showError('로그인에 실패했습니다. 아이디와 비밀번호를 확인해주세요.');
                loginBtn.disabled = false;
                loginBtn.textContent = '로그인';
                return;
            }

            showSuccess('로그인 성공! 메인 페이지로 이동합니다.');
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        });

        document.getElementById('google-login').addEventListener('click', async () => {
            const { data, error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/index.html'
                }
            });

            if (error) {
                showError('Google 로그인에 실패했습니다.');
            }
        });
    </script>
</body>
</html>
