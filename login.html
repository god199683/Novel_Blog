<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title">로그인</h2>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="아이디" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>
        <p class="auth-footer">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            // 회원가입 시 설정했던 것과 동일한 가짜 도메인을 붙여 이메일 형식으로 만듭니다.
            const fakeEmail = `${username}@novel.blog`;

            // 로그인 버튼 비활성화 (중복 클릭 방지)
            const submitBtn = loginForm.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = '로그인 중...';

            try {
                // Supabase 로그인 실행
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password,
                });

                if (error) throw error;

                // 로그인 성공 시
                alert("반갑습니다, " + username + "님!");
                // 성공 후 이동할 페이지 (예: 소개 페이지나 소설 관리 페이지)
                window.location.href = 'index.html'; 

            } catch (err) {
                console.error("로그인 에러:", err.message);
                alert("로그인 실패: 아이디 또는 비밀번호를 확인해주세요.");
                
                // 버튼 복구
                submitBtn.disabled = false;
                submitBtn.textContent = '로그인';
            }
        });
    </script>
</body>
</html>
