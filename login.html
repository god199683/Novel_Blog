<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title">로그인</h2>
        
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="아이디" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="비밀번호" required>
            </div>
            <button type="submit" class="btn btn-primary">로그인</button>
        </form>

        <p class="auth-footer">계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            // [핵심] 가입할 때와 똑같이 아이디 뒤에 도메인을 붙여서 이메일 형식으로 만듭니다.
            const fakeEmail = username + "@novel.blog";

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email: fakeEmail,
                    password: password,
                });

                if (error) throw error;

                alert("반갑습니다, " + username + "님!");
                // 로그인 성공 후 이동할 페이지 (예: 메인 소개 페이지 또는 계정 관리)
                window.location.href = 'index.html'; 

            } catch (err) {
                alert("로그인 실패: 아이디 또는 비밀번호를 확인하세요.");
                console.error(err.message);
            }
        });
    </script>
</body>
</html>
