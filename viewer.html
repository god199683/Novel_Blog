<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 뷰어 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css?v=999">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <style>
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .viewer-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; background: #f9f9f9; }
        .navbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 40px; border-bottom: 1px solid #eee; background: #fff; }
        .logo { grid-column: 2; font-size: 24px; font-weight: bold; color: #87CEEB; cursor: pointer; }
        #auth-nav { grid-column: 3; justify-self: end; min-height: 40px; display: flex; align-items: center; }
        
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #eee; display: flex; flex-direction: column; transition: width 0.3s ease, opacity 0.2s ease; overflow: hidden; position: relative; flex-shrink: 0; height: 100%; }
        .sidebar.collapsed { width: 0; border: none; opacity: 0; pointer-events: none; transition: none; }
        #sidebar-toggle { position: absolute; left: 280px; top: 10px; z-index: 100; cursor: pointer; background: #87CEEB; color: #fff; border: none; padding: 8px 12px; border-radius: 0 5px 5px 0; transition: left 0.3s ease; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar.collapsed + #sidebar-toggle { left: 0; transition: none; }

        .list-dropdown, .dropdown-menu { position: absolute; background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 1100; padding: 10px 0; }
        .list-dropdown.active { display: flex; top: 45px; right: 10px; width: 220px; }
        .dropdown-menu { top: 100%; right: 0; width: 170px; }
        .list-group-title { padding: 8px 15px; font-size: 0.75rem; color: #aaa; font-weight: bold; background: #fafafa; border-top: 1px solid #f0f0f0; }
        .list-item, .dropdown-item { padding: 8px 20px; font-size: 0.85rem; color: #444; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .list-item:hover, .dropdown-item:hover { background: #f0faff; color: #87CEEB; }

        .content-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; }
        .reader-box { width: 100%; max-width: 750px; background: #fff; padding: 60px 50px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); min-height: 90%; margin-bottom: 40px; }
        .tree-container { flex: 1; overflow-y: auto; padding: 5px 10px; display: flex; flex-direction: column; }
        .tree-group { list-style: none; padding-left: 12px; min-height: 20px; margin: 0; }
        .item-content { display: flex; align-items: center; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 0.85rem; position: relative; }
        .item-content.dragging { opacity: 0.3; border: 1px dashed #87CEEB; }
        .drag-over-line::after { content: ""; position: absolute; left: 0; bottom: -2px; width: 100%; height: 2px; background: #87CEEB; }
        .folder-over { background-color: #e0f2ff !important; }
        .sub-nav { display: flex; justify-content: center; gap: 30px; background: #f8f9fa; padding: 12px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload()">Novel-Blog</div>
        <nav id="auth-nav">
            <script>
                (function() {
                    const cached = localStorage.getItem('userProfile');
                    if (cached) {
                        const p = JSON.parse(cached);
                        document.write(`
                            <div id="user-menu-trigger" style="display:flex; align-items:center; gap:10px; cursor:pointer; position:relative;">
                                <img src="${p.avatar || ''}" id="nav-avatar" style="width:32px; height:32px; border-radius:50%; border:2px solid #87CEEB;" onerror="this.src='https://via.placeholder.com/32'">
                                <span id="nav-nickname" style="font-weight:600;">${p.nickname} 작가님 ▼</span>
                                <div id="user-dropdown" class="dropdown-menu">
                                    <div class="dropdown-item" id="go-away-btn">자리비움</div>
                                    <a href="account.html" class="dropdown-item">계정관리</a>
                                    <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
                                    <div class="dropdown-item" id="logout-btn" style="color:#ff6b6b;">로그아웃</div>
                                </div>
                            </div>
                        `);
                    }
                })();
            </script>
        </nav>
    </header>

    <nav class="sub-nav">
        <a href="viewer.html" style="color:#87CEEB; font-weight:bold; text-decoration:none;">소설 뷰어</a>
        <a href="editor.html" style="text-decoration:none; color:#666;">소설 에디터</a>
        <a href="manage.html" style="text-decoration:none; color:#666;">소설 관리</a>
        <a href="translate.html" style="text-decoration:none; color:#666;">번역기</a>
    </nav>

    <div class="viewer-wrapper">
        <script>
            (function() {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                document.write(`<aside class="sidebar ${isCollapsed ? 'collapsed' : ''}" id="sidebar">`);
            })();
        </script>
            <div style="padding: 12px 15px; border-bottom: 1px solid #eee; font-weight: bold; color: #87CEEB; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative;">
                <span>Novel</span>
                <span id="list-icon-trigger" style="cursor:pointer; font-size: 1.1rem;">📋</span>
                <div id="list-menu-dropdown" class="list-dropdown">
                    <div class="list-group-title">추가</div>
                    <div class="list-item" onclick="addFolder()">폴더 추가</div>
                    <div class="list-group-title">도구 상자</div>
                    <div class="list-item" onclick="alert('선택 모드')">선택 모드</div>
                    <div class="list-item" onclick="alert('전체 선택')">전체 선택</div>
                    <div class="list-item" onclick="alert('선택 해제')">선택 해제</div>
                    <div class="list-item" onclick="alert('전체 삭제')">전체 삭제</div>
                    <div class="list-item" onclick="alert('선택 항목 삭제')">선택 항목 삭제</div>
                    <div class="list-item" onclick="alert('오름차순 정렬')">오름차순 정렬</div>
                    <div class="list-item" onclick="alert('내림차순 정렬')">내림차순 정렬</div>
                    <div class="list-group-title">내보내기 및 불러오기</div>
                    <div class="list-item" onclick="alert('전체 내보내기')">전체 내보내기</div>
                    <div class="list-item" onclick="alert('선택 항목 내보내기')">선택 항목 내보내기</div>
                    <div class="list-item" onclick="alert('불러오기')">불러오기</div>
                </div>
            </div>
            <div class="tree-container" id="tree-dropzone">
                <ul class="tree-group" id="main-group" style="list-style:none; padding-left:12px;">
                    <li class="tree-item" draggable="true" data-id="default-memo">
                        <div class="item-content" onclick="showMemo('프롤로그', '부제목', '본문 내용 샘플입니다.')">📝 프롤로그 메모</div>
                    </li>
                </ul>
            </div>
        </aside>
        <button id="sidebar-toggle">◀</button>

        <main class="content-container">
            <article class="reader-box">
                <div class="viewer-header" style="border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 15px;">
                    <h2 id="viewer-title" style="color: #87CEEB;">제목</h2>
                    <h3 id="viewer-subtitle" style="font-size: 1rem; color: #888; margin-top: 5px; font-weight: normal;">부제목</h3>
                </div>
                <div id="viewer-content" style="line-height: 2.2; white-space: pre-wrap; font-size: 1.1rem; color: #444;">자리비움 기능이 복구되었습니다.</div>
            </article>
        </main>
    </div>

    <div id="lock-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); display:none; z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center; border:1px solid #87CEEB;">
            <h3 style="color:#87CEEB; margin-bottom:20px;">자리비움 모드</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">보안을 위해 PIN 번호를 입력하세요.</p>
            <input type="password" id="pin-input" placeholder="PIN 입력 (1234)" style="padding:12px; width:100%; border:1px solid #ddd; border-radius:8px; text-align:center; font-size: 1.2rem; margin-bottom: 15px;">
            <button onclick="unlock()" style="width:100%; padding:12px; background:#87CEEB; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">해제하기</button>
        </div>
    </div>

    <script>
        let draggedItem = null;

        function showMemo(t, s, c) {
            document.getElementById('viewer-title').innerText = t;
            document.getElementById('viewer-subtitle').innerText = s;
            document.getElementById('viewer-content').innerText = c;
        }

        // [복구] 자리비움 해제 함수
        function unlock() {
            const input = document.getElementById('pin-input');
            if(input.value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                input.value = '';
            } else {
                alert("PIN 번호가 올바르지 않습니다.");
                input.value = '';
            }
        }

        function addFolder() {
            const name = prompt("폴더 이름을 입력하세요:", "새 폴더");
            if (!name) return;
            const folderId = 'folder-' + Date.now();
            createFolderElement(name, folderId, 'main-group');
            saveTreeStructure();
            document.getElementById('list-menu-dropdown').classList.remove('active');
        }

        function createFolderElement(name, id, parentId) {
            const parent = document.getElementById('main-group');
            const li = document.createElement('li');
            li.className = 'tree-item'; li.draggable = true;
            li.dataset.id = id; li.dataset.type = 'folder'; li.dataset.name = name;
            li.innerHTML = `<div class="item-content folder">📁 ${name}</div><ul class="tree-group"></ul>`;
            parent.appendChild(li);
            attachDragEvents(li);
        }

        function saveTreeStructure() {
            const folders = [];
            document.querySelectorAll('#main-group > .tree-item[data-type="folder"]').forEach(f => {
                folders.push({ id: f.dataset.id, name: f.dataset.name });
            });
            localStorage.setItem('sidebarFolders', JSON.stringify(folders));
        }

        function loadTreeStructure() {
            const saved = localStorage.getItem('sidebarFolders');
            if (saved) { JSON.parse(saved).forEach(f => createFolderElement(f.name, f.id, 'main-group')); }
        }

        function attachDragEvents(item) {
            const content = item.querySelector('.item-content');
            item.addEventListener('dragstart', (e) => { draggedItem = item; e.stopPropagation(); content.classList.add('dragging'); });
            item.addEventListener('dragend', () => { content.classList.remove('dragging'); draggedItem = null; saveTreeStructure(); });
            item.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); if (content.classList.contains('folder')) content.classList.add('folder-over'); else content.classList.add('drag-over-line'); });
            item.addEventListener('dragleave', () => { content.classList.remove('folder-over'); content.classList.remove('drag-over-line'); });
            item.addEventListener('drop', (e) => {
                e.preventDefault(); e.stopPropagation();
                content.classList.remove('folder-over'); content.classList.remove('drag-over-line');
                if (content.classList.contains('folder')) item.querySelector('.tree-group').appendChild(draggedItem);
                else item.parentNode.insertBefore(draggedItem, item.nextSibling);
                saveTreeStructure();
            });
        }

        async function checkUser() {
            if (!window.supabaseClient) { setTimeout(checkUser, 50); return; }
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            if (user) {
                const nickname = user.user_metadata.display_name || user.user_metadata.username || "작가";
                const avatar = user.user_metadata.avatar_url || "";
                localStorage.setItem('userProfile', JSON.stringify({ nickname, avatar }));
                
                const nickEl = document.getElementById('nav-nickname');
                const avaEl = document.getElementById('nav-avatar');
                if (nickEl) nickEl.innerText = `${nickname} 작가님 ▼`;
                if (avaEl) avaEl.src = avatar;

                bindEvents();
            } else { location.href = 'login.html'; }
        }

        function bindEvents() {
            const trigger = document.getElementById('user-menu-trigger');
            const dropdown = document.getElementById('user-dropdown');
            const listIcon = document.getElementById('list-icon-trigger');
            const listMenu = document.getElementById('list-menu-dropdown');

            if (trigger) trigger.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex'; };
            if (listIcon) listIcon.onclick = (e) => { e.stopPropagation(); listMenu.classList.toggle('active'); };
            
            // [복구] 자리비움 버튼 이벤트 바인딩
            const goAwayBtn = document.getElementById('go-away-btn');
            if (goAwayBtn) goAwayBtn.onclick = () => { 
                document.getElementById('lock-screen').style.display = 'flex';
                dropdown.style.display = 'none';
            };

            document.onclick = () => { if (dropdown) dropdown.style.display = 'none'; if (listMenu) listMenu.classList.remove('active'); };
            
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) logoutBtn.onclick = async () => {
                localStorage.removeItem('userProfile');
                await window.supabaseClient.auth.signOut();
                location.href = 'index.html';
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkUser();
            loadTreeStructure();
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                toggleBtn.style.left = '0'; toggleBtn.innerText = '▶';
            }
            toggleBtn.onclick = () => {
                const collapsed = sidebar.classList.toggle('collapsed');
                toggleBtn.innerText = collapsed ? "▶" : "◀";
                toggleBtn.style.left = collapsed ? "0" : "280px";
                localStorage.setItem('sidebarCollapsed', collapsed);
            };

            document.querySelectorAll('.tree-item').forEach(attachDragEvents);
        });
    </script>
</body>
</html>
