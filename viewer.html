<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 뷰어 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #viewer-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .viewer-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #b0cbde; font-size: 0.95rem; gap: 0.5rem; }
        .viewer-empty svg { width: 48px; height: 48px; stroke: #d0e3f2; margin-bottom: 0.5rem; }
        .novel-reader-subtitle { font-size: 0.95rem; color: #5a7a9a; margin-bottom: 0.2rem; }
        .novel-reader-header { flex-shrink: 0; padding: 1rem 2rem 0; max-width: 720px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .novel-reader-body { flex: 1; overflow-y: auto; }
        .novel-reader-body-inner { padding: 0 2rem 2rem; max-width: 720px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .novel-reader-content { word-break: break-word; overflow-wrap: break-word; }
        .viewer-header { display: flex; justify-content: flex-end; padding: 8px 16px 0; flex-shrink: 0; }
        .viewer-edit-btn { display: none; padding: 6px 16px; border: 1px solid #3a9ad9; border-radius: 6px; background: #fff; color: #3a9ad9; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .viewer-edit-btn:hover { background: #3a9ad9; color: #fff; }
        .novel-reader-content img { max-width: 100%; height: auto; }
    </style>
</head>
<body class="write-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <nav class="page-nav">
            <a href="write.html" class="page-nav-item">작성</a>
            <a href="viewer.html" class="page-nav-item active">뷰어</a>
            <a href="manage.html" class="page-nav-item">관리</a>
            <a href="translate.html" class="page-nav-item">DeepL</a>
            <a href="translate-free.html" class="page-nav-item">무료 번역</a>
        </nav>
        <section class="viewer-section">
            <div class="viewer-header">
                <button class="viewer-edit-btn" id="viewer-edit-btn">수정</button>
            </div>
            <div id="viewer-container">
                <div class="viewer-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                    <span>사이드바에서 소설을 선택하세요</span>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) window.location.href = 'login.html';
        })();

        const container = document.getElementById('viewer-container');
        const editBtn = document.getElementById('viewer-edit-btn');
        let currentNovelId = null;

        editBtn.addEventListener('click', function () {
            if (currentNovelId) window.location.href = 'write?edit=' + currentNovelId;
        });

        // 사이드바 노드 클릭 시 소설 표시
        window.sidebarTree.onNodeClick = async function (node) {
            // novel_ 접두사로 저장된 소설 ID 추출
            const novelId = node.id.startsWith('novel_') ? node.id.replace('novel_', '') : null;
            if (!novelId) {
                currentNovelId = null;
                editBtn.style.display = 'none';
                container.innerHTML =
                    '<div class="novel-reader">' +
                        '<div class="novel-reader-title">' + escapeHtml(node.name) + '</div>' +
                        '<div class="novel-reader-meta">메모</div>' +
                    '</div>';
                return;
            }

            container.innerHTML = '<div class="viewer-empty"><span>불러오는 중...</span></div>';

            const { data, error } = await sb.from('novels').select('*').eq('id', novelId).single();
            if (error || !data) {
                currentNovelId = null;
                editBtn.style.display = 'none';
                container.innerHTML = '<div class="viewer-empty"><span>소설을 찾을 수 없습니다.</span></div>';
                return;
            }

            currentNovelId = novelId;
            editBtn.style.display = 'inline-block';

            const date = new Date(data.created_at).toLocaleDateString('ko-KR', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            const subtitleHtml = data.subtitle ? '<div class="novel-reader-subtitle">' + escapeHtml(data.subtitle) + '</div>' : '';

            container.innerHTML =
                '<div class="novel-reader-header">' +
                    '<div class="novel-reader-title">' + escapeHtml(data.title) + '</div>' +
                    subtitleHtml +
                    '<div class="novel-reader-meta">' + date + ' · ' + (data.status === 'draft' ? '임시저장' : '발행됨') + '</div>' +
                '</div>' +
                '<div class="novel-reader-body">' +
                    '<div class="novel-reader-body-inner">' +
                        '<div class="novel-reader-content">' + (data.content || '') + '</div>' +
                    '</div>' +
                '</div>';
        };

        function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // 소설 삭제 시 현재 보던 소설이면 초기 상태로
        const emptyHTML = container.innerHTML;
        window.addEventListener('novels-changed', function () {
            if (!currentNovelId) return;
            // 사이드바 트리에서 해당 노드가 사라졌는지 확인
            const tree = window.sidebarTree.getTree();
            function findNode(nodes, id) {
                for (let i = 0; i < nodes.length; i++) {
                    if (nodes[i].id === id) return true;
                    if (nodes[i].children && findNode(nodes[i].children, id)) return true;
                }
                return false;
            }
            if (!findNode(tree, 'novel_' + currentNovelId)) {
                currentNovelId = null;
                editBtn.style.display = 'none';
                container.innerHTML = emptyHTML;
            }
        });

        // URL 파라미터로 소설 자동 로드
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('novel')) {
            const novelId = urlParams.get('novel');
            window.sidebarTree.onNodeClick({ id: 'novel_' + novelId, type: 'memo', name: '' });
        }
    </script>
</body>
</html>
