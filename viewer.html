<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel-Blog : 서재</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body class="main-layout">
<header class="top-bar">
    <div class="top-left">
        </div>
    
    <div class="top-center">
        <div class="logo">Novel-Blog</div>
    </div>

    <div class="top-right">
    <div class="profile-dropdown" id="profile-trigger">
        <div class="profile-info">
            <img id="top-user-avatar" src="https://via.placeholder.com/35" alt="프로필">
            <span id="user-display-name">작가님</span>
            <span class="dropdown-arrow">▼</span>
        </div>
        
        <ul class="dropdown-menu" id="dropdown-menu">
            <li onclick="location.href='settings.html'">계정 관리</li>
            <li onclick="location.href='sidebar-manage.html'">사이드바 설정</li> <li id="btn-away">자리비움</li>
            <hr>
            <li id="btn-logout" class="logout-item">로그아웃</li>
        </ul>
    </div>
</div>
</header>

    <nav class="top-nav">
        <ul>
            <li><a href="viewer.html" class="active">내 서재</a></li>
            <li><a href="editor.html">소설 에디터</a></li>
            <li><a href="translator.html">번역기</a></li>
        </ul>
    </nav>

    <div class="container">
    <aside class="sidebar" id="sidebar">
        <button id="sidebar-toggle" class="sidebar-handle-btn">
            <span id="toggle-icon">◀</span>
        </button>
        
        <div class="sidebar-title">내 작품 목록</div>
        <ul class="novel-list-side" id="novel-list-side">
            <li class="empty-side">작성된 소설이 없습니다.</li>
        </ul>
    </aside>

        <main class="content-area">
            <header class="content-header">
                <h2 id="view-title">작품 상세 내용</h2>
            </header>
            <section class="viewer-content">
                <p class="empty-msg">사이드바에서 작품을 선택하거나 새 소설을 시작해 보세요.</p>
            </section>
        </main>
    </div>

<div id="lock-screen" class="lock-screen" style="display: none;">
    <div class="lock-content">
        <h1 class="logo">Novel-Blog</h1>
        <p class="lock-msg">자리비움 중입니다.</p>
        <div class="input-group">
            <input type="password" id="lock-password" placeholder="비밀번호를 입력하세요">
        </div>
        <button id="btn-unlock" class="btn btn-primary">잠금 해제</button>
        <p id="lock-error" class="error-msg" style="display: none;">비밀번호가 일치하지 않습니다.</p>
    </div>
</div>

<script src="./js/viewer.js"></script>

</body>
</html>
