<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 뷰어 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css?v=999">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <style>
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .viewer-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; background: #f9f9f9; }
        .navbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 40px; }
        .logo { grid-column: 2; font-size: 24px; font-weight: bold; color: #87CEEB; cursor: pointer; }
        #auth-nav { grid-column: 3; justify-self: end; min-height: 40px; }
        .sidebar {
            width: 280px; background: #fff; border-right: 1px solid #eee;
            display: flex; flex-direction: column; 
            transition: width 0.3s ease, opacity 0.2s ease;
            overflow: hidden; position: relative; flex-shrink: 0; height: 100%;
        }
        .sidebar.collapsed { width: 0; border: none; opacity: 0; pointer-events: none; transition: none; }
        #sidebar-toggle {
            position: absolute; left: 280px; top: 10px; z-index: 100;
            cursor: pointer; background: #87CEEB; color: #fff; border: none;
            padding: 8px 12px; border-radius: 0 5px 5px 0;
            transition: left 0.3s ease; box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar.collapsed + #sidebar-toggle { left: 0; transition: none; }

        .list-dropdown {
            position: absolute; top: 45px; right: 10px; width: 220px;
            background: #fff; border: 1px solid #eee; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none;
            flex-direction: column; z-index: 1100; padding: 10px 0;
        }
        .list-dropdown.active { display: flex; }
        .list-group-title { padding: 8px 15px; font-size: 0.75rem; color: #aaa; font-weight: bold; background: #fafafa; border-top: 1px solid #f0f0f0; }
        .list-group-title:first-child { border-top: none; }
        .list-item { padding: 8px 20px; font-size: 0.85rem; color: #444; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: #f0faff; color: #87CEEB; }

        .content-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; }
        .reader-box { width: 100%; max-width: 750px; background: #fff; padding: 60px 50px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); min-height: 90%; margin-bottom: 40px; }
        .tree-container { flex: 1; overflow-y: auto; padding: 5px 10px; display: flex; flex-direction: column; }
        .tree-group { list-style: none; padding-left: 12px; min-height: 20px; margin: 0; }
        .item-content { display: flex; align-items: center; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 0.85rem; position: relative; }
        .item-content.dragging { opacity: 0.3; border: 1px dashed #87CEEB; }
        .drag-over-line::after { content: ""; position: absolute; left: 0; bottom: -2px; width: 100%; height: 2px; background: #87CEEB; }
        .folder-over { background-color: #e0f2ff !important; }
        .sub-nav { display: flex; justify-content: center; gap: 30px; background: #f8f9fa; padding: 12px 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload()">Novel-Blog</div>
        <nav id="auth-nav">
            <script>
                // 캐시된 프로필 즉시 렌더링 (로그인 전 공백 방지)
                (function() {
                    const cached = localStorage.getItem('userProfile');
                    if (cached) {
                        const p = JSON.parse(cached);
                        document.write(`
                            <div id="user-menu-trigger" style="display:flex; align-items:center; gap:10px; cursor:pointer; position:relative;">
                                <img src="${p.avatar || ''}" style="width:32px; height:32px; border-radius:50%; border:2px solid #87CEEB;" onerror="this.src='https://via.placeholder.com/32'">
                                <span style="font-weight:600;">${p.nickname} 작가님 ▼</span>
                                <div id="user-dropdown" class="dropdown-menu" style="position:absolute; top:100%; right:0; width:170px; background:#fff; border:1px solid #eee; display:none; flex-direction:column; padding:5px 0; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.1); z-index:1000;">
                                    <div class="dropdown-item" id="go-away-btn" style="padding:12px 20px; cursor:pointer;">자리비움</div>
                                    <a href="account.html" style="padding:12px 20px; text-decoration:none; color:#444; display:block;">계정관리</a>
                                    <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
                                    <div class="dropdown-item" id="logout-btn" style="padding:12px 20px; color:#ff6b6b; cursor:pointer;">로그아웃</div>
                                </div>
                            </div>
                        `);
                    }
                })();
            </script>
        </nav>
    </header>

    <nav class="sub-nav">
        <a href="viewer.html" style="color:#87CEEB; font-weight:bold; text-decoration:none;">소설 뷰어</a>
        <a href="editor.html" style="text-decoration:none; color:#666;">소설 에디터</a>
        <a href="manage.html" style="text-decoration:none; color:#666;">소설 관리</a>
        <a href="translate.html" style="text-decoration:none; color:#666;">번역기</a>
    </nav>

    <div class="viewer-wrapper">
        <script>
            (function() {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                document.write(`<aside class="sidebar ${isCollapsed ? 'collapsed' : ''}" id="sidebar">`);
            })();
        </script>
            <div style="padding: 12px 15px; border-bottom: 1px solid #eee; font-weight: bold; color: #87CEEB; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: relative;">
                <span>Novel</span>
                <span id="list-icon-trigger" style="cursor:pointer; font-size: 1.1rem;">📋</span>
                
                <div id="list-menu-dropdown" class="list-dropdown">
                    <div class="list-group-title">추가</div>
                    <div class="list-item" onclick="addFolder()">폴더 추가</div>
                    <div class="list-group-title">도구 상자</div>
                    <div class="list-item" onclick="menuAction('선택 모드')">선택 모드</div>
                    <div class="list-item" onclick="menuAction('전체 선택')">전체 선택</div>
                    <div class="list-item" onclick="menuAction('선택 해제')">선택 해제</div>
                    <div class="list-item" onclick="menuAction('전체 삭제')">전체 삭제</div>
                    <div class="list-item" onclick="menuAction('선택 항목 삭제')">선택 항목 삭제</div>
                    <div class="list-item" onclick="menuAction('오름차순 정렬')">오름차순 정렬</div>
                    <div class="list-item" onclick="menuAction('내림차순 정렬')">내림차순 정렬</div>
                    <div class="list-group-title">내보내기 및 불러오기</div>
                    <div class="list-item" onclick="menuAction('전체 내보내기')">전체 내보내기</div>
                    <div class="list-item" onclick="menuAction('선택 항목 내보내기')">선택 항목 내보내기</div>
                    <div class="list-item" onclick="menuAction('불러오기')">불러오기</div>
                </div>
            </div>
            <div class="tree-container" id="tree-dropzone">
                <ul class="tree-group" id="main-group" style="list-style:none; padding-left:12px;">
                    <li class="tree-item" draggable="true">
                        <div class="item-content" onclick="showMemo('프롤로그', '부제목', '본문 내용 샘플입니다.')">📝 프롤로그 메모</div>
                    </li>
                </ul>
            </div>
        </aside>
        <button id="sidebar-toggle">◀</button>

        <main class="content-container">
            <article class="reader-box">
                <div class="viewer-header" style="border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 15px;">
                    <h2 id="viewer-title" style="color: #87CEEB;">제목</h2>
                    <h3 id="viewer-subtitle" style="font-size: 1rem; color: #888; margin-top: 5px; font-weight: normal;">부제목</h3>
                </div>
                <div id="viewer-content" style="line-height: 2.2; white-space: pre-wrap; font-size: 1.1rem; color: #444;">Supabase 연결 및 프로필 반영 기능이 수정되었습니다.</div>
            </article>
        </main>
    </div>

    <script>
        let draggedItem = null;

        function showMemo(t, s, c) {
            document.getElementById('viewer-title').innerText = t;
            document.getElementById('viewer-subtitle').innerText = s;
            document.getElementById('viewer-content').innerText = c;
        }

        function menuAction(name) { alert(`${name} 기능을 실행합니다.`); document.getElementById('list-menu-dropdown').classList.remove('active'); }

        function addFolder() {
            const name = prompt("폴더 이름:", "새 폴더");
            if (!name) return;
            const li = document.createElement('li');
            li.className = 'tree-item'; li.draggable = true;
            li.innerHTML = `<div class="item-content folder">📁 ${name}</div><ul class="tree-group"></ul>`;
            document.getElementById('main-group').appendChild(li);
            attachDragEvents(li);
            document.getElementById('list-menu-dropdown').classList.remove('active');
        }

        function attachDragEvents(item) {
            const content = item.querySelector('.item-content');
            item.addEventListener('dragstart', (e) => { draggedItem = item; e.stopPropagation(); content.classList.add('dragging'); });
            item.addEventListener('dragend', () => { content.classList.remove('dragging'); draggedItem = null; });
            item.addEventListener('dragover', (e) => {
                e.preventDefault(); e.stopPropagation();
                if (content.classList.contains('folder')) content.classList.add('folder-over');
                else content.classList.add('drag-over-line');
            });
            item.addEventListener('dragleave', () => { content.classList.remove('folder-over'); content.classList.remove('drag-over-line'); });
            item.addEventListener('drop', (e) => {
                e.preventDefault(); e.stopPropagation();
                content.classList.remove('folder-over'); content.classList.remove('drag-over-line');
                if (content.classList.contains('folder')) item.querySelector('.tree-group').appendChild(draggedItem);
                else item.parentNode.insertBefore(draggedItem, item.nextSibling);
            });
        }

        // [핵심] Supabase 연결 및 프로필 즉시 로드 로직
        const initApp = async () => {
            // supabaseClient가 로드될 때까지 잠시 대기
            if (!window.supabaseClient) {
                setTimeout(initApp, 100);
                return;
            }

            const { data: { user } } = await window.supabaseClient.auth.getUser();
            
            if (user) {
                const nickname = user.user_metadata.display_name || user.user_metadata.username || "작가";
                const avatar = user.user_metadata.avatar_url || "";
                
                // 최신 정보 캐시 업데이트
                localStorage.setItem('userProfile', JSON.stringify({ nickname, avatar }));

                // auth-nav가 비어있다면(첫 로그인 등) 즉시 생성
                const nav = document.getElementById('auth-nav');
                if (!document.getElementById('user-menu-trigger')) {
                    nav.innerHTML = `
                        <div id="user-menu-trigger" style="display:flex; align-items:center; gap:10px; cursor:pointer; position:relative;">
                            <img src="${avatar}" style="width:32px; height:32px; border-radius:50%; border:2px solid #87CEEB;" onerror="this.src='https://via.placeholder.com/32'">
                            <span style="font-weight:600;">${nickname} 작가님 ▼</span>
                            <div id="user-dropdown" class="dropdown-menu" style="position:absolute; top:100%; right:0; width:170px; background:#fff; border:1px solid #eee; display:none; flex-direction:column; padding:5px 0; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.1); z-index:1000;">
                                <div class="dropdown-item" id="go-away-btn" style="padding:12px 20px; cursor:pointer;">자리비움</div>
                                <a href="account.html" style="padding:12px 20px; text-decoration:none; color:#444; display:block;">계정관리</a>
                                <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
                                <div class="dropdown-item" id="logout-btn" style="padding:12px 20px; color:#ff6b6b; cursor:pointer;">로그아웃</div>
                            </div>
                        </div>`;
                }

                // 이벤트 바인딩
                const trigger = document.getElementById('user-menu-trigger');
                const dropdown = document.getElementById('user-dropdown');
                if (trigger) trigger.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex'; };

                const listIcon = document.getElementById('list-icon-trigger');
                const listMenu = document.getElementById('list-menu-dropdown');
                if (listIcon) listIcon.onclick = (e) => { e.stopPropagation(); listMenu.classList.toggle('active'); };

                document.onclick = () => { if (dropdown) dropdown.style.display = 'none'; if (listMenu) listMenu.classList.remove('active'); };
                document.getElementById('logout-btn').onclick = async () => { 
                    localStorage.removeItem('userProfile'); 
                    await window.supabaseClient.auth.signOut(); 
                    location.href='index.html'; 
                };
            } else {
                location.href = 'login.html';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            initApp();

            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                toggleBtn.style.left = '0'; toggleBtn.innerText = '▶';
            }
            toggleBtn.onclick = () => {
                const collapsed = sidebar.classList.toggle('collapsed');
                toggleBtn.innerText = collapsed ? "▶" : "◀";
                toggleBtn.style.left = collapsed ? "0" : "280px";
                localStorage.setItem('sidebarCollapsed', collapsed);
            };

            document.querySelectorAll('.tree-item').forEach(attachDragEvents);
            const dropzone = document.getElementById('tree-dropzone');
            dropzone.addEventListener('dragover', (e) => e.preventDefault());
            dropzone.addEventListener('drop', (e) => {
                if (e.target.id === 'tree-dropzone' || e.target.id === 'main-group') document.getElementById('main-group').appendChild(draggedItem);
            });
        });
    </script>
</body>
</html>
