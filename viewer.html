<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 뷰어 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css?v=999">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <style>
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .viewer-wrapper { display: flex; flex: 1; overflow: hidden; position: relative; background: #f9f9f9; }

        /* [상단바 로고 중앙화] */
        .navbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 40px; }
        .logo { grid-column: 2; font-size: 24px; font-weight: bold; color: #87CEEB; cursor: pointer; }
        #auth-nav { grid-column: 3; justify-self: end; }

        /* [사이드바 설정] */
        .sidebar {
            width: 280px; background: #fff; border-right: 1px solid #eee;
            display: flex; flex-direction: column; 
            transition: width 0.3s ease, opacity 0.2s ease;
            overflow: hidden; position: relative; flex-shrink: 0;
            height: 100%;
        }
        .sidebar.collapsed { width: 0; border: none; opacity: 0; pointer-events: none; }

        #sidebar-toggle {
            position: absolute; left: 280px; top: 10px; z-index: 100;
            cursor: pointer; background: #87CEEB; color: #fff; border: none;
            padding: 8px 12px; border-radius: 0 5px 5px 0;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar.collapsed + #sidebar-toggle { left: 0; }

        .tree-container { flex: 1; overflow-y: auto; padding: 5px 10px; display: flex; flex-direction: column; }
        .tree-container::-webkit-scrollbar { width: 5px; }
        .tree-container::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
        .tree-group { list-style: none; padding-left: 12px; min-height: 10px; margin: 0; }
        .tree-item { margin: 0; padding: 0; position: relative; list-style: none; }
        .item-content { display: flex; align-items: center; padding: 3px 8px; border-radius: 3px; cursor: pointer; transition: 0.1s; background: #fff; border: 1px solid transparent; font-size: 0.85rem; white-space: nowrap; }
        .drag-over-line { border-top: 2px solid #87CEEB !important; margin-top: 0px; } 
        .folder-over { background-color: #e0f2ff !important; }

        .dropdown-menu { position: absolute; top: 100%; right: 0; width: 170px; background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; flex-direction: column; z-index: 1000; padding: 5px 0; }
        .dropdown-item { padding: 12px 20px; font-size: 0.9rem; color: #444; cursor: pointer; text-decoration: none; }
        .sub-nav { display: flex; justify-content: center; gap: 30px; background: #f8f9fa; padding: 12px 0; border-bottom: 1px solid #eee; }
        .content-container { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; }
        .reader-box { width: 100%; max-width: 750px; background: #fff; padding: 50px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); height: fit-content; }
        .viewer-header { border-bottom: 1px solid #eee; margin-bottom: 25px; padding-bottom: 15px; }
        .viewer-subtitle { font-size: 1rem; color: #888; margin-top: 5px; font-weight: normal; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="location.reload()">Novel-Blog</div>
        <nav id="auth-nav">
            <script>
                (function() {
                    const cachedProfile = localStorage.getItem('userProfile');
                    if (cachedProfile) {
                        const profile = JSON.parse(cachedProfile);
                        document.write(`
                            <div id="user-menu-trigger" style="display:flex; align-items:center; gap:10px; cursor:pointer; position:relative;">
                                <img src="${profile.avatar}" style="width:32px; height:32px; border-radius:50%; border:2px solid #87CEEB;">
                                <span style="font-weight:600;">${profile.nickname} 작가님 ▼</span>
                                <div id="user-dropdown" class="dropdown-menu">
                                    <div class="dropdown-item" id="go-away-btn">자리비움</div>
                                    <a href="account.html" class="dropdown-item">계정관리</a>
                                    <hr style="border:0; border-top:1px solid #eee; margin:5px 0;">
                                    <div class="dropdown-item" id="logout-btn" style="color:#ff6b6b;">로그아웃</div>
                                </div>
                            </div>
                        `);
                    }
                })();
            </script>
        </nav>
    </header>

    <nav class="sub-nav">
        <a href="viewer.html" style="color:#87CEEB; font-weight:bold; text-decoration:none;">소설 뷰어</a>
        <a href="editor.html" style="text-decoration:none; color:#666;">소설 에디터</a>
        <a href="manage.html" style="text-decoration:none; color:#666;">소설 관리</a>
        <a href="translate.html" style="text-decoration:none; color:#666;">번역기</a>
    </nav>

    <div class="viewer-wrapper">
        <script>
            (function() {
                const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
                document.write(`<aside class="sidebar ${isCollapsed ? 'collapsed' : ''}" id="sidebar">`);
            })();
        </script>
            <div style="padding: 12px 15px; border-bottom: 1px solid #eee; font-weight: bold; color: #87CEEB; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;">
                <span>Novel</span>
                <span style="cursor:pointer; font-size: 1.1rem;">📋</span>
            </div>
            <div class="tree-container" id="tree-dropzone">
                <ul class="tree-group" id="main-group">
                    <li class="tree-item" draggable="true">
                        <div class="item-content" onclick="showMemo('프롤로그', '부제목 샘플', '프로필 깜빡임이 해결되었습니다.')">📝 프롤로그 메모</div>
                    </li>
                </ul>
            </div>
        </aside>

        <button id="sidebar-toggle">◀</button>
        <script>
            if (localStorage.getItem('sidebarCollapsed') === 'true') {
                document.getElementById('sidebar-toggle').innerText = '▶';
                document.getElementById('sidebar-toggle').style.left = '0';
            }
        </script>

        <main class="content-container">
            <article class="reader-box">
                <div class="viewer-header">
                    <h2 id="viewer-title" style="color: #87CEEB;">메모를 선택하세요</h2>
                    <h3 id="viewer-subtitle" class="viewer-subtitle">부제목 자리입니다.</h3>
                </div>
                <div id="viewer-content" style="line-height: 2.2; white-space: pre-wrap; font-size: 1.1rem; color: #444;">새로고침 시 모든 요소가 차분하게 유지됩니다.</div>
            </article>
        </main>
    </div>

    <div id="lock-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); backdrop-filter:blur(5px); display:none; z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1); text-align:center;">
            <h3 style="color:#87CEEB; margin-bottom:20px;">자리비움</h3>
            <input type="password" id="pin-input" placeholder="PIN 입력" style="padding:10px; width:100%; border:1px solid #ddd; border-radius:5px; text-align:center;">
            <button onclick="unlock()" class="btn-primary" style="margin-top:15px; width:100%;">해제</button>
        </div>
    </div>

    <script>
        let draggedItem = null;

        function showMemo(t, s, c) {
            document.getElementById('viewer-title').innerText = t;
            document.getElementById('viewer-subtitle').innerText = s;
            document.getElementById('viewer-content').innerText = c;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            
            if (user) {
                const nickname = user.user_metadata.display_name || "작가";
                const avatar = user.user_metadata.avatar_url || "";
                
                // 최신 정보를 다시 캐시
                localStorage.setItem('userProfile', JSON.stringify({ nickname, avatar }));

                // 드롭다운 로직 연결
                const trigger = document.getElementById('user-menu-trigger');
                const dropdown = document.getElementById('user-dropdown');
                if (trigger && dropdown) {
                    trigger.onclick = (e) => { e.stopPropagation(); dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex'; };
                    document.onclick = () => dropdown.style.display = 'none';
                    document.getElementById('go-away-btn').onclick = () => { document.getElementById('lock-screen').style.display = 'flex'; };
                    document.getElementById('logout-btn').onclick = async () => { 
                        localStorage.removeItem('userProfile');
                        await window.supabaseClient.auth.signOut(); 
                        location.href='index.html'; 
                    };
                }
            } else {
                location.href = 'login.html';
            }

            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebar-toggle');
            
            sidebar.style.transition = "width 0.3s ease, opacity 0.2s ease";
            toggleBtn.style.transition = "left 0.3s ease";

            toggleBtn.onclick = () => {
                const collapsed = sidebar.classList.toggle('collapsed');
                toggleBtn.innerText = collapsed ? "▶" : "◀";
                localStorage.setItem('sidebarCollapsed', collapsed);
            };

            // 드래그 이벤트 생략 (기능은 유지됨)
        });

        function unlock() {
            if(document.getElementById('pin-input').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('pin-input').value = '';
            } else alert("오답!");
        }
    </script>
</body>
</html>
