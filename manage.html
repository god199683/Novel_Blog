<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 관리 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .manage-section { padding: 0; height: calc(100vh - 45px - 38px); background: #fff; display: flex; flex-direction: column; overflow: hidden; }
        .manage-header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid #e8f2fb; flex-shrink: 0; }
        .manage-header h2 { font-size: 1.1rem; color: #2c3e50; flex: 1; }
        .manage-search { padding: 6px 12px; border: 1px solid #d0e3f2; border-radius: 8px; font-size: 0.85rem; outline: none; width: 200px; }
        .manage-search:focus { border-color: #3a9ad9; }
        .manage-list { flex: 1; overflow-y: auto; padding: 12px 20px; }
        .manage-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid #e8f2fb; border-radius: 10px; margin-bottom: 8px; transition: all 0.15s; }
        .manage-item:hover { border-color: #3a9ad9; box-shadow: 0 2px 8px rgba(58,154,217,0.1); }
        .manage-item-info { flex: 1; min-width: 0; }
        .manage-item-title { font-size: 1rem; font-weight: 700; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .manage-item-meta { font-size: 0.78rem; color: #7a9ab5; margin-top: 2px; }
        .manage-item-preview { font-size: 0.82rem; color: #5a7a9a; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .manage-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .manage-btn { padding: 6px 14px; border: 1px solid #d0e3f2; background: #fff; border-radius: 6px; font-size: 0.8rem; cursor: pointer; color: #5a7a9a; transition: all 0.15s; font-family: inherit; }
        .manage-btn:hover { border-color: #3a9ad9; color: #3a9ad9; }
        .manage-btn-danger { color: #dc2626; border-color: #fecaca; }
        .manage-btn-danger:hover { background: #fef2f2; border-color: #dc2626; color: #dc2626; }
        .manage-empty { text-align: center; color: #b0cbde; padding: 4rem 1rem; font-size: 0.95rem; }
        .manage-count { font-size: 0.82rem; color: #7a9ab5; }
    </style>
</head>
<body class="write-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <nav class="page-nav">
            <a href="write.html" class="page-nav-item">작성</a>
            <a href="viewer.html" class="page-nav-item">뷰어</a>
            <a href="manage.html" class="page-nav-item active">관리</a>
        </nav>
        <section class="manage-section">
            <div class="manage-header">
                <h2>소설 관리</h2>
                <span class="manage-count" id="manage-count"></span>
                <input type="text" class="manage-search" id="manage-search" placeholder="검색...">
            </div>
            <div class="manage-list" id="manage-list">
                <div class="manage-empty">불러오는 중...</div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const listEl = document.getElementById('manage-list');
            const countEl = document.getElementById('manage-count');
            const searchEl = document.getElementById('manage-search');
            let allNovels = [];

            async function loadNovels() {
                const { data, error } = await sb.from('novels')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .order('created_at', { ascending: false });

                if (error) { listEl.innerHTML = '<div class="manage-empty">불러오기 실패</div>'; return; }
                allNovels = data || [];
                renderList(allNovels);
            }

            function stripHtml(html) {
                const tmp = document.createElement('div');
                tmp.innerHTML = html || '';
                return tmp.textContent || '';
            }

            function renderList(novels) {
                countEl.textContent = novels.length + '편';
                if (novels.length === 0) {
                    listEl.innerHTML = '<div class="manage-empty">소설이 없습니다.</div>';
                    return;
                }
                listEl.innerHTML = novels.map(n => {
                    const date = new Date(n.created_at).toLocaleDateString('ko-KR', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    const status = n.status === 'draft' ? '임시저장' : '발행됨';
                    const preview = stripHtml(n.content).substring(0, 80);
                    return '<div class="manage-item" data-id="' + n.id + '">' +
                        '<div class="manage-item-info">' +
                            '<div class="manage-item-title">' + escapeHtml(n.title) + '</div>' +
                            '<div class="manage-item-meta">' + date + ' · ' + status + '</div>' +
                            (preview ? '<div class="manage-item-preview">' + escapeHtml(preview) + '</div>' : '') +
                        '</div>' +
                        '<div class="manage-item-actions">' +
                            '<button class="manage-btn" data-action="edit" data-id="' + n.id + '">수정</button>' +
                            '<button class="manage-btn manage-btn-danger" data-action="delete" data-id="' + n.id + '">삭제</button>' +
                        '</div>' +
                    '</div>';
                }).join('');
            }

            function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

            listEl.addEventListener('click', async (e) => {
                const btn = e.target.closest('.manage-btn');
                if (!btn) return;
                const id = btn.dataset.id;
                const action = btn.dataset.action;

                if (action === 'edit') {
                    window.location.href = 'write?edit=' + id;
                } else if (action === 'delete') {
                    if (!confirm('이 소설을 삭제하시겠습니까?')) return;
                    const { error } = await sb.from('novels').delete().eq('id', id);
                    if (!error) {
                        // 사이드바에서도 제거 + 리렌더
                        if (window.sidebarTree) {
                            window.sidebarTree.removeNode('novel_' + id);
                        }
                        await loadNovels();
                    }
                }
            });

            searchEl.addEventListener('input', () => {
                const q = searchEl.value.trim().toLowerCase();
                if (!q) { renderList(allNovels); return; }
                renderList(allNovels.filter(n =>
                    n.title.toLowerCase().includes(q) || stripHtml(n.content).toLowerCase().includes(q)
                ));
            });

            await loadNovels();
        })();
    </script>
</body>
</html>
