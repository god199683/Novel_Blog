<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>번역 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .translate-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .translate-toolbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #e8f2fb; background: #f7fbff; flex-shrink: 0; flex-wrap: wrap; }
        .translate-toolbar label { font-size: 0.82rem; color: #5a7a9a; }
        .translate-toolbar select, .translate-toolbar input { border: 1px solid #d0e3f2; border-radius: 6px; padding: 5px 10px; font-size: 0.85rem; color: #2c3e50; background: #fff; outline: none; }
        .translate-toolbar input { width: 260px; }
        .translate-btn { padding: 6px 20px; border: none; border-radius: 6px; background: #3a9ad9; color: #fff; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
        .translate-btn:hover { background: #2a7ab9; }
        .translate-btn:disabled { background: #b0cbde; cursor: not-allowed; }
        .translate-panels { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        .translate-section { min-height: calc(100vh - 120px); }
        .translate-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .translate-panel + .translate-panel { border-left: 1px solid #e8f2fb; }
        .translate-panel-header { padding: 8px 16px; font-size: 0.82rem; color: #5a7a9a; background: #f7fbff; border-bottom: 1px solid #e8f2fb; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .translate-panel-body { flex: 1; overflow-y: auto; padding: 16px; }
        .translate-panel-body textarea { width: 100%; height: 100%; border: none; outline: none; resize: none; font-size: 10.5pt; line-height: 1.9; color: #2c3e50; font-family: inherit; }
        .translate-result { font-size: 10.5pt; line-height: 1.9; color: #2c3e50; white-space: pre-wrap; word-break: break-word; }
        .translate-load-btn { padding: 4px 10px; border: 1px solid #d0e3f2; border-radius: 4px; background: #fff; color: #5a7a9a; font-size: 0.78rem; cursor: pointer; }
        .translate-load-btn:hover { background: #e8f2fb; }
        .translate-copy-btn { padding: 4px 10px; border: 1px solid #d0e3f2; border-radius: 4px; background: #fff; color: #5a7a9a; font-size: 0.78rem; cursor: pointer; }
        .translate-copy-btn:hover { background: #e8f2fb; }
        .translate-status { font-size: 0.78rem; color: #7a9ab5; padding: 4px 16px; border-top: 1px solid #e8f2fb; flex-shrink: 0; text-align: right; }
        .api-key-info { font-size: 0.75rem; color: #999; }
    </style>
</head>
<body class="write-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <nav class="page-nav">
            <a href="write.html" class="page-nav-item">작성</a>
            <a href="viewer.html" class="page-nav-item">뷰어</a>
            <a href="manage.html" class="page-nav-item">관리</a>
            <a href="translate.html" class="page-nav-item active">DeepL</a>
            <a href="translate-free.html" class="page-nav-item">무료 번역</a>
            <a href="translate-multi.html" class="page-nav-item">멀티 번역</a>
            <a href="translate-pro.html" class="page-nav-item">프로 번역</a>
        </nav>
        <section class="translate-section">
            <div class="translate-toolbar">
                <label>원본:</label>
                <select id="source-lang">
                    <option value="KO" selected>한국어</option>
                    <option value="EN">영어</option>
                    <option value="JA">일본어</option>
                    <option value="ZH">중국어</option>
                    <option value="DE">독일어</option>
                    <option value="FR">프랑스어</option>
                    <option value="ES">스페인어</option>
                    <option value="PT">포르투갈어</option>
                    <option value="RU">러시아어</option>
                </select>
                <span style="color:#b0cbde;">→</span>
                <label>번역:</label>
                <select id="target-lang">
                    <option value="EN-US" selected>영어 (미국)</option>
                    <option value="EN-GB">영어 (영국)</option>
                    <option value="JA">일본어</option>
                    <option value="ZH-HANS">중국어 (간체)</option>
                    <option value="ZH-HANT">중국어 (번체)</option>
                    <option value="KO">한국어</option>
                    <option value="DE">독일어</option>
                    <option value="FR">프랑스어</option>
                    <option value="ES">스페인어</option>
                    <option value="PT-BR">포르투갈어 (브라질)</option>
                    <option value="RU">러시아어</option>
                </select>
                <button class="translate-btn" id="translate-btn">번역</button>
                <input type="password" id="api-key" placeholder="DeepL API Key" title="DeepL API Key">
                <span class="api-key-info">Free/Pro 키 지원</span>
            </div>

            <div class="translate-panels">
                <div class="translate-panel">
                    <div class="translate-panel-header">
                        <span>원문</span>
                    </div>
                    <div class="translate-panel-body">
                        <textarea id="source-text" placeholder="번역할 텍스트를 입력하세요..."></textarea>
                    </div>
                </div>
                <div class="translate-panel">
                    <div class="translate-panel-header">
                        <span>번역 결과</span>
                        <button class="translate-copy-btn" id="copy-result-btn">복사</button>
                    </div>
                    <div class="translate-panel-body">
                        <div class="translate-result" id="result-text">번역 결과가 여기에 표시됩니다.</div>
                    </div>
                </div>
            </div>

            <div class="translate-status" id="translate-status"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const sourceText = document.getElementById('source-text');
            const resultText = document.getElementById('result-text');
            const translateBtn = document.getElementById('translate-btn');
            const apiKeyInput = document.getElementById('api-key');
            const statusEl = document.getElementById('translate-status');
            const copyResultBtn = document.getElementById('copy-result-btn');

            // API 키 localStorage에 저장/복원
            const APIKEY_STORAGE = 'deepl-api-key';
            apiKeyInput.value = localStorage.getItem(APIKEY_STORAGE) || '';
            apiKeyInput.addEventListener('change', () => {
                localStorage.setItem(APIKEY_STORAGE, apiKeyInput.value);
            });

            // 번역 실행
            translateBtn.addEventListener('click', async () => {
                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) { alert('DeepL API Key를 입력하세요.'); return; }
                const text = sourceText.value.trim();
                if (!text) { alert('번역할 텍스트를 입력하세요.'); return; }

                translateBtn.disabled = true;
                translateBtn.textContent = '번역 중...';
                statusEl.textContent = '번역 요청 중...';
                resultText.textContent = '';

                try {
                    // DeepL API: Free 키는 api-free.deepl.com, Pro 키는 api.deepl.com
                    const isFree = apiKey.endsWith(':fx');
                    const baseUrl = isFree ? 'https://api-free.deepl.com' : 'https://api.deepl.com';

                    // 텍스트를 5000자 단위로 분할
                    const chunks = [];
                    const maxLen = 5000;
                    let remaining = text;
                    while (remaining.length > 0) {
                        if (remaining.length <= maxLen) {
                            chunks.push(remaining);
                            break;
                        }
                        // 줄바꿈 기준으로 끊기
                        let cutAt = remaining.lastIndexOf('\n', maxLen);
                        if (cutAt < maxLen * 0.5) cutAt = maxLen;
                        chunks.push(remaining.substring(0, cutAt));
                        remaining = remaining.substring(cutAt).trimStart();
                    }

                    let fullResult = '';
                    for (let i = 0; i < chunks.length; i++) {
                        statusEl.textContent = '번역 중... (' + (i + 1) + '/' + chunks.length + ')';

                        const params = new URLSearchParams();
                        params.append('text', chunks[i]);
                        params.append('source_lang', document.getElementById('source-lang').value);
                        params.append('target_lang', document.getElementById('target-lang').value);

                        const response = await fetch(baseUrl + '/v2/translate', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'DeepL-Auth-Key ' + apiKey,
                                'Content-Type': 'application/x-www-form-urlencoded'
                            },
                            body: params.toString()
                        });

                        if (!response.ok) {
                            const errText = await response.text();
                            if (response.status === 403) throw new Error('API Key가 유효하지 않습니다.');
                            if (response.status === 456) throw new Error('번역 할당량을 초과했습니다.');
                            throw new Error('DeepL API 오류: ' + response.status + ' ' + errText);
                        }

                        const result = await response.json();
                        if (result.translations && result.translations[0]) {
                            fullResult += result.translations[0].text;
                            if (i < chunks.length - 1) fullResult += '\n';
                        }
                    }

                    resultText.textContent = fullResult;
                    statusEl.textContent = '번역 완료 (원문 ' + text.length.toLocaleString() + '자 → 번역 ' + fullResult.length.toLocaleString() + '자)';
                } catch (e) {
                    resultText.textContent = '번역 실패: ' + e.message;
                    statusEl.textContent = '번역 실패';
                }

                translateBtn.disabled = false;
                translateBtn.textContent = '번역';
            });

            // 결과 복사
            copyResultBtn.addEventListener('click', () => {
                const text = resultText.textContent;
                if (!text || text === '번역 결과가 여기에 표시됩니다.') return;
                navigator.clipboard.writeText(text).then(() => {
                    copyResultBtn.textContent = '복사됨!';
                    setTimeout(() => { copyResultBtn.textContent = '복사'; }, 1500);
                });
            });
        })();
    </script>
</body>
</html>
