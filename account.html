<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 관리 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .account-section { padding: 2rem; max-width: 560px; margin: 0 auto; }
        .account-card { background: #fff; border: 1px solid #e8f2fb; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.2rem; }
        .account-card h3 { font-size: 1rem; color: #2c3e50; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e8f2fb; }
        .account-row { display: flex; align-items: center; gap: 12px; margin-bottom: 0.8rem; }
        .account-label { font-size: 0.85rem; font-weight: 600; color: #5a7a9a; min-width: 100px; }
        .account-value { font-size: 0.9rem; color: #2c3e50; flex: 1; }
        .account-input { flex: 1; padding: 8px 12px; border: 1px solid #d0e3f2; border-radius: 8px; font-size: 0.9rem; outline: none; font-family: inherit; }
        .account-input:focus { border-color: #3a9ad9; box-shadow: 0 0 0 3px rgba(58,154,217,0.1); }
        .account-btn { padding: 8px 20px; background: #3a9ad9; color: #fff; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; }
        .account-btn:hover { background: #2b82c1; }
        .account-btn-outline { background: #fff; color: #5a7a9a; border: 1px solid #d0e3f2; }
        .account-btn-outline:hover { border-color: #3a9ad9; color: #3a9ad9; }
        .account-btn-danger { background: #dc2626; }
        .account-btn-danger:hover { background: #b91c1c; }
        .account-msg { font-size: 0.82rem; padding: 6px 10px; border-radius: 6px; margin-top: 0.5rem; }
        .account-msg-success { background: #f0fdf4; color: #16a34a; }
        .account-msg-error { background: #fef2f2; color: #dc2626; }
        .account-actions { display: flex; gap: 8px; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="account-section">
            <h2 style="font-size:1.3rem;color:#2c3e50;margin-bottom:1.2rem;">계정 관리</h2>

            <div class="account-card">
                <h3>프로필 정보</h3>
                <div class="account-row">
                    <span class="account-label">아이디</span>
                    <span class="account-value" id="acc-userid">-</span>
                </div>
                <div class="account-row">
                    <span class="account-label">이메일</span>
                    <span class="account-value" id="acc-email">-</span>
                </div>
                <div class="account-row">
                    <span class="account-label">닉네임</span>
                    <input type="text" class="account-input" id="acc-nickname" placeholder="닉네임">
                </div>
                <div class="account-actions">
                    <button class="account-btn" id="btn-save-profile">프로필 저장</button>
                </div>
                <div id="profile-msg"></div>
            </div>

            <div class="account-card">
                <h3>자리비움 PIN</h3>
                <div class="account-row">
                    <span class="account-label">PIN 번호</span>
                    <input type="password" class="account-input" id="acc-pin" placeholder="6자리 숫자" maxlength="6">
                </div>
                <div class="account-actions">
                    <button class="account-btn" id="btn-save-pin">PIN 저장</button>
                    <button class="account-btn account-btn-outline" id="btn-clear-pin">PIN 해제</button>
                </div>
                <div id="pin-msg"></div>
            </div>

            <div class="account-card">
                <h3>비밀번호 변경</h3>
                <div class="account-row">
                    <span class="account-label">새 비밀번호</span>
                    <input type="password" class="account-input" id="acc-newpw" placeholder="새 비밀번호">
                </div>
                <div class="account-row">
                    <span class="account-label">비밀번호 확인</span>
                    <input type="password" class="account-input" id="acc-newpw2" placeholder="비밀번호 확인">
                </div>
                <div class="account-actions">
                    <button class="account-btn" id="btn-change-pw">비밀번호 변경</button>
                </div>
                <div id="pw-msg"></div>
            </div>

            <div class="account-actions" style="justify-content:space-between;margin-top:1.5rem;">
                <button class="account-btn account-btn-outline" onclick="history.back()">돌아가기</button>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            const user = session.user;

            // 프로필 표시
            document.getElementById('acc-userid').textContent = user.user_metadata?.user_id || user.email?.split('@')[0] || '-';
            document.getElementById('acc-email').textContent = user.email || '-';
            document.getElementById('acc-nickname').value = user.user_metadata?.nickname || '';

            // PIN 로드
            document.getElementById('acc-pin').value = localStorage.getItem('away-pin') || '';

            // 숫자만 입력
            document.getElementById('acc-pin').addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });

            function showMsg(id, text, type) {
                const el = document.getElementById(id);
                el.className = 'account-msg account-msg-' + type;
                el.textContent = text;
                setTimeout(() => { el.textContent = ''; el.className = 'account-msg'; }, 3000);
            }

            // 프로필 저장
            document.getElementById('btn-save-profile').addEventListener('click', async () => {
                const nickname = document.getElementById('acc-nickname').value.trim();
                if (!nickname) { showMsg('profile-msg', '닉네임을 입력하세요.', 'error'); return; }
                const { error } = await sb.auth.updateUser({
                    data: { nickname: nickname }
                });
                showMsg('profile-msg', error ? '저장 실패: ' + error.message : '저장되었습니다.', error ? 'error' : 'success');
            });

            // PIN 저장
            document.getElementById('btn-save-pin').addEventListener('click', () => {
                const pin = document.getElementById('acc-pin').value.trim();
                if (pin && pin.length !== 6) { showMsg('pin-msg', 'PIN은 6자리 숫자여야 합니다.', 'error'); return; }
                if (pin) {
                    localStorage.setItem('away-pin', pin);
                    showMsg('pin-msg', 'PIN이 설정되었습니다.', 'success');
                } else {
                    showMsg('pin-msg', 'PIN을 입력하세요.', 'error');
                }
            });

            // PIN 해제
            document.getElementById('btn-clear-pin').addEventListener('click', () => {
                localStorage.removeItem('away-pin');
                document.getElementById('acc-pin').value = '';
                showMsg('pin-msg', 'PIN이 해제되었습니다.', 'success');
            });

            // 비밀번호 변경
            document.getElementById('btn-change-pw').addEventListener('click', async () => {
                const pw = document.getElementById('acc-newpw').value;
                const pw2 = document.getElementById('acc-newpw2').value;
                if (!pw) { showMsg('pw-msg', '새 비밀번호를 입력하세요.', 'error'); return; }
                if (pw !== pw2) { showMsg('pw-msg', '비밀번호가 일치하지 않습니다.', 'error'); return; }
                if (pw.length < 6) { showMsg('pw-msg', '비밀번호는 6자 이상이어야 합니다.', 'error'); return; }
                const { error } = await sb.auth.updateUser({ password: pw });
                if (error) {
                    showMsg('pw-msg', '변경 실패: ' + error.message, 'error');
                } else {
                    showMsg('pw-msg', '비밀번호가 변경되었습니다.', 'success');
                    document.getElementById('acc-newpw').value = '';
                    document.getElementById('acc-newpw2').value = '';
                }
            });
        })();
    </script>
</body>
</html>
