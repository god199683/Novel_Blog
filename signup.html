<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title">회원가입</h2>
        <form id="signup-form">
            <div class="input-group">
                <input type="email" id="email" placeholder="이메일 주소" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="비밀번호 (6자리 이상)" required>
            </div>
            <div class="input-group">
                <input type="text" id="nickname" placeholder="닉네임" required>
            </div>
            <button type="submit" class="btn btn-primary full-width">가입하기</button>
        </form>
        <p class="auth-footer">이미 계정이 있으신가요? <a href="login.html">로그인</a></p>
    </div>

    <script>
        const signupForm = document.getElementById('signup-form');

        // 'submit' 이벤트를 사용하면 버튼 클릭과 엔터 키 모두 감지합니다.
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // 페이지 새로고침 방지

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nickname = document.getElementById('nickname').value;

            try {
                // 1. Supabase Auth 회원가입 호출
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { display_name: nickname } // 메타데이터에 닉네임 저장
                    }
                });

                if (error) throw error;

                // 2. 가입 성공 시 알림 (이메일 인증이 설정되어 있다면 메일 확인 필요)
                alert("회원가입 신청이 완료되었습니다! 이메일을 확인해 주세요.");
                window.location.href = "login.html";

            } catch (error) {
                console.error("회원가입 에러:", error.message);
                alert("에러 발생: " + error.message);
            }
        });
    </script>
</body>
</html>
