<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="auth-card">
                <h2>회원가입</h2>
                <p class="auth-subtitle">Novel_Blog에서 당신의 이야기를 시작하세요</p>

                <div id="error-message" class="error-message" style="display:none;"></div>
                <div id="success-message" class="success-message" style="display:none;"></div>

                <form id="signup-form">
                    <div class="profile-upload">
                        <div class="profile-preview" id="profile-preview">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#b0cbde" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <label for="profile-input" class="profile-label">프로필 사진 선택</label>
                        <input type="file" id="profile-input" accept="image/*" hidden>
                    </div>
                    <div class="form-group">
                        <label for="user-id">아이디</label>
                        <input type="text" id="user-id" placeholder="영문, 숫자 조합 4~20자" required minlength="4" maxlength="20" pattern="[a-zA-Z0-9_]+">
                    </div>
                    <div class="form-group">
                        <label for="nickname">닉네임</label>
                        <input type="text" id="nickname" placeholder="활동에 사용할 닉네임" required minlength="2" maxlength="12">
                    </div>
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="6자 이상 입력하세요" required minlength="6">
                            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="비밀번호 표시">
                                <svg class="eye-icon" id="eye-off" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a9ab5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                <svg class="eye-icon" id="eye-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3a9ad9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password-confirm">비밀번호 확인</label>
                        <div class="password-wrapper">
                            <input type="password" id="password-confirm" placeholder="비밀번호를 다시 입력하세요" required minlength="6">
                            <button type="button" class="toggle-pw" id="toggle-pw-confirm" aria-label="비밀번호 표시">
                                <svg class="eye-icon" id="eye-off-confirm" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7a9ab5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                <svg class="eye-icon" id="eye-on-confirm" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3a9ad9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary auth-btn" id="signup-btn">회원가입</button>
                </form>

                <p class="auth-footer">
                    이미 계정이 있으신가요? <a href="login.html">로그인</a>
                </p>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        // 비밀번호 표시/숨김 토글
        function setupToggle(btnId, inputId, eyeOffId, eyeOnId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const input = document.getElementById(inputId);
                const eyeOff = document.getElementById(eyeOffId);
                const eyeOn = document.getElementById(eyeOnId);
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                eyeOff.style.display = isHidden ? 'none' : 'block';
                eyeOn.style.display = isHidden ? 'block' : 'none';
            });
        }
        // 프로필 사진 미리보기
        const profileInput = document.getElementById('profile-input');
        const profilePreview = document.getElementById('profile-preview');
        profilePreview.addEventListener('click', () => profileInput.click());
        profileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    profilePreview.innerHTML = '<img src="' + ev.target.result + '" alt="프로필">';
                };
                reader.readAsDataURL(file);
            }
        });

        setupToggle('toggle-pw', 'password', 'eye-off', 'eye-on');
        setupToggle('toggle-pw-confirm', 'password-confirm', 'eye-off-confirm', 'eye-on-confirm');

        const signupForm = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-message');
        const successMsg = document.getElementById('success-message');
        const signupBtn = document.getElementById('signup-btn');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userId = document.getElementById('user-id').value;
            const nickname = document.getElementById('nickname').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            if (password !== passwordConfirm) {
                showError('비밀번호가 일치하지 않습니다.');
                return;
            }

            signupBtn.disabled = true;
            signupBtn.textContent = '가입 중...';

            const email = userId + '@novelblog.user';

            const { data, error } = await sb.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        user_id: userId,
                        nickname: nickname
                    }
                }
            });

            if (error) {
                showError('회원가입에 실패했습니다. 이미 사용 중인 아이디일 수 있습니다.');
                signupBtn.disabled = false;
                signupBtn.textContent = '회원가입';
                return;
            }

            // 프로필 사진 업로드 (base64로 user_metadata에 저장)
            const profileFile = profileInput.files[0];
            if (profileFile && data.user) {
                try {
                    const avatarBase64 = await resizeImageToBase64(profileFile, 200);
                    await sb.auth.updateUser({
                        data: { avatar_url: avatarBase64 }
                    });
                } catch (e) { /* 사진 실패 시 무시 */ }
            }

            showSuccess('회원가입 성공! 로그인 페이지로 이동합니다.');
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        });

        function resizeImageToBase64(file, maxSize) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; } }
                        else { if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; } }
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>
</html>
