<!DOCTYPE html>
<html lang="ko">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="./js/supabase-config.js"></script>

<script src="./js/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel-Blog : 회원가입</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body class="auth-page">
    <div class="login-container signup-container">
        <header class="auth-header">
            <h1 class="logo">Novel-Blog</h1>
            <p>새로운 작가님을 환영합니다.</p>
        </header>

        <form id="signup-form" class="auth-form">
            <div class="profile-upload-group">
                <div class="profile-preview-wrapper" onclick="document.getElementById('profile-image').click()">
                    <img id="profile-preview" src="https://via.placeholder.com/100/eeeeee/87ceeb?text=%2B" alt="프로필 미리보기">
                    <div class="upload-overlay">편집</div>
                </div>
                <label for="profile-image" class="profile-upload-label">프로필 사진 등록 (선택)</label>
                <input type="file" id="profile-image" accept="image/*" style="display: none;">
            </div>

            <div class="input-group">
                <label for="username">사용할 아이디</label>
                <input type="text" id="username" placeholder="영문, 숫자 조합" required>
            </div>

            <div class="input-group">
                <label for="nickname">작가 닉네임</label>
                <input type="text" id="nickname" placeholder="플랫폼에서 보일 이름" required>
            </div>
            
            <div class="input-group">
                <label for="password">패스워드</label>
                <input type="password" id="password" placeholder="6자리 이상 입력하세요" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">가입하기</button>
            
            <div class="auth-footer">
                <span>이미 계정이 있으신가요?</span>
                <a href="login.html" class="link-signup">로그인</a>
            </div>
        </form>
    </div>

    <script src="./js/auth.js"></script>
</body>
</html>
