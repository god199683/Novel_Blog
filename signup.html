<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title">회원가입</h2>
        
        <form id="signup-form">
            <div class="profile-upload-group">
    <label for="profile-image">
        <img src="https://via.placeholder.com/150/87CEEB/FFFFFF?text=Click" id="preview-img" class="profile-preview">
    </label>
    <input type="file" id="profile-image" accept="image/*" style="display: none;">
    <span class="profile-hint">사진을 클릭하여 선택하세요</span>
</div>

<div class="input-group">
    <input type="text" id="username" placeholder="아이디 (영문/숫자)" required>
</div>
<div class="input-group">
    <input type="text" id="nickname" placeholder="닉네임" required>
</div>
<div class="input-group">
    <input type="password" id="password" placeholder="비밀번호 (6자 이상)" required>
</div>


            <button type="submit" class="btn btn-primary">가입하기</button>
        </form>

        <p class="auth-footer">계정이 이미 있으신가요? <a href="login.html">로그인</a></p>
    </div>

    <script src="./js/auth.js"></script>
</body>
</html>
