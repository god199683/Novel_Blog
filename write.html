    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) window.location.href = 'login.html';
        })();

        // ── Quill 모듈 등록 ──
        const Font = Quill.import('attributors/class/font');
        const _basefonts = ['malgun-gothic', 'noto-sans-kr', 'nanum-gothic', 'nanum-myeongjo', 'batang', 'dotum', 'gulim', 'gungsuh', 'georgia', 'arial', 'times-new-roman', 'segoe-ui', 'verdana', 'tahoma', 'trebuchet-ms', 'courier-new', 'consolas', 'monospace', 'impact', 'comic-sans'];

        // 저장된 커스텀 글꼴 복원
        const _CUSTOM_FONTS_KEY = 'custom-fonts';
        let _customFonts = [];
        try { _customFonts = JSON.parse(localStorage.getItem(_CUSTOM_FONTS_KEY)) || []; } catch(e) {}

        // 커스텀 글꼴 CSS + @font-face 즉시 적용
        if (_customFonts.length > 0) {
            const styleEl = document.createElement('style');
            let css = '';
            _customFonts.forEach(f => {
                const esc = f.family.replace(/'/g, "\\'");
                css += `@font-face { font-family: '${esc}'; src: url('${f.dataUrl}'); font-display: swap; }\n`;
                css += `.ql-font-${CSS.escape(f.slug)} { font-family: '${esc}', sans-serif; }\n`;
                css += `.ql-snow .ql-picker.ql-font .ql-picker-label[data-value="${f.slug}"]::before,\n`;
                css += `.ql-snow .ql-picker.ql-font .ql-picker-item[data-value="${f.slug}"]::before { content: '${esc}'; font-family: '${esc}', sans-serif; }\n`;
            });
            styleEl.textContent = css;
            document.head.appendChild(styleEl);
        }

        // whitelist = 기본 + 커스텀 slug
        Font.whitelist = _basefonts.concat(_customFonts.map(f => f.slug));
        Quill.register(Font, true);

        const Size = Quill.import('attributors/style/size');
        Size.whitelist = ['9pt', '10pt', '11pt', '12pt', '14pt', '16pt', '18pt', '20pt', '24pt', '28pt', '36pt', '48pt'];
        Quill.register(Size, true);

        // ── 줄간격 ──
        const Parchment = Quill.import('parchment');
        const LineHeightStyle = new Parchment.StyleAttributor('lineHeight', 'line-height', {
            scope: Parchment.Scope.BLOCK,
            whitelist: ['1', '1.2', '1.5', '1.8', '2', '2.5', '3']
        });
        Quill.register(LineHeightStyle, true);

        // ── 구분선(HR) 블롯 ──
        const BlockEmbed = Quill.import('blots/block/embed');
        class DividerBlot extends BlockEmbed {
            static blotName = 'divider';
            static tagName = 'hr';
        }
        Quill.register(DividerBlot);

        // ── 커스텀 툴바 아이콘 ──
        const icons = Quill.import('ui/icons');
        icons['divider'] = '<svg viewBox="0 0 18 18"><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2"/></svg>';
        icons['insertTable'] = '<svg viewBox="0 0 18 18"><rect x="2" y="2" width="14" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1"/><line x1="2" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1"/><line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1"/><line x1="12" y1="2" x2="12" y2="16" stroke="currentColor" stroke-width="1"/></svg>';
        icons['fullscreen'] = '<svg viewBox="0 0 18 18"><path d="M2 6V2h4M12 2h4v4M16 12v4h-4M6 16H2v-4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>';

        // ── Quill 에디터 초기화 ──
        const toolbarOptions = {
            container: [
                [{ 'header': [1, 2, 3, 4, false] }],
                [{ 'font': [''].concat(_basefonts).concat(_customFonts.map(f => f.slug)) }],
                [{ 'size': ['9pt', '10pt', '11pt', false, '14pt', '16pt', '18pt', '20pt', '24pt', '28pt', '36pt', '48pt'] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'script': 'sub' }, { 'script': 'super' }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                [{ 'indent': '-1' }, { 'indent': '+1' }],
                [{ 'align': [] }],
                [{ 'lineHeight': ['1', '1.2', '1.5', '1.8', '2', '2.5', '3'] }],
                ['blockquote', 'code-block'],
                ['divider', 'insertTable'],
                ['link', 'image', 'video'],
                ['clean', 'fullscreen']
            ],
            handlers: {
                'divider': function() {
                    const range = this.quill.getSelection(true);
                    this.quill.insertText(range.index, '\n', Quill.sources.USER);
                    this.quill.insertEmbed(range.index + 1, 'divider', true, Quill.sources.USER);
                    this.quill.setSelection(range.index + 2, Quill.sources.SILENT);
                },
                'insertTable': function() {
                    const q = this.quill;
                    const savedRange = q.getSelection(true);
                    // 모달로 행/열 입력
                    const overlay = document.createElement('div');
                    overlay.className = 'modal-overlay';
                    overlay.innerHTML =
                        '<div class="modal-dialog" style="max-width:280px;">' +
                            '<div class="modal-title">표 삽입</div>' +
                            '<label style="display:block;margin-bottom:8px;font-size:0.85rem;color:#5a7a9a;">행 수</label>' +
                            '<input type="number" id="table-rows" value="3" min="1" max="20" style="width:100%;padding:6px 10px;border:1px solid #d0e3f2;border-radius:6px;margin-bottom:12px;font-size:0.9rem;">' +
                            '<label style="display:block;margin-bottom:8px;font-size:0.85rem;color:#5a7a9a;">열 수</label>' +
                            '<input type="number" id="table-cols" value="3" min="1" max="20" style="width:100%;padding:6px 10px;border:1px solid #d0e3f2;border-radius:6px;margin-bottom:16px;font-size:0.9rem;">' +
                            '<div style="display:flex;justify-content:flex-end;gap:8px;">' +
                                '<button id="table-cancel" class="modal-btn-cancel" style="padding:6px 16px;border:1px solid #d0e3f2;border-radius:6px;background:#fff;color:#5a7a9a;cursor:pointer;">취소</button>' +
                                '<button id="table-confirm" class="modal-btn-ok" style="padding:6px 16px;border:none;border-radius:6px;background:#3a9ad9;color:#fff;cursor:pointer;">삽입</button>' +
                            '</div>' +
                        '</div>';
                    document.body.appendChild(overlay);
                    document.getElementById('table-rows').focus();
                    document.getElementById('table-cancel').addEventListener('click', () => overlay.remove());
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
                    document.getElementById('table-confirm').addEventListener('click', () => {
                        const r = parseInt(document.getElementById('table-rows').value) || 3;
                        const c = parseInt(document.getElementById('table-cols').value) || 3;
                        overlay.remove();
                        let html = '<table><tbody>';
                        for (let i = 0; i < r; i++) {
                            html += '<tr>';
                            for (let j = 0; j < c; j++) html += '<td><br></td>';
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                        const idx = savedRange ? savedRange.index : q.getLength() - 1;
                        q.clipboard.dangerouslyPasteHTML(idx, html, Quill.sources.USER);
                    });
                },
                'fullscreen': function() {
                    document.body.classList.toggle('editor-fullscreen');
                    const btn = document.querySelector('.ql-fullscreen');
                    if (btn) btn.classList.toggle('ql-active', document.body.classList.contains('editor-fullscreen'));
                }
            }
        };

        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '내용을 입력하세요...',
            modules: {
                toolbar: toolbarOptions,
                history: { delay: 1000, maxStack: 50, userOnly: true }
            }
        });

        // 툴바 버튼 클릭 시 에디터 포커스 유지 (더블클릭 방지, 드롭다운은 제외)
        document.querySelector('.ql-toolbar').addEventListener('mousedown', function(e) {
            if (e.target.closest('button')) {
                e.preventDefault();
            }
        });

        // ── 글꼴 파일 불러오기 (ttf/otf/woff 파일 선택, localStorage 영속) ──
        (function() {
            const fontPicker = document.querySelector('.ql-snow .ql-picker.ql-font');
            if (!fontPicker) return;
            const opts = fontPicker.querySelector('.ql-picker-options');
            if (!opts) return;

            const toolbar = document.querySelector('.ql-toolbar');
            const loadBtn = document.createElement('button');
            loadBtn.type = 'button';
            loadBtn.textContent = '글꼴 추가';
            loadBtn.title = '폰트 파일(.ttf, .otf, .woff)을 선택하여 추가';
            loadBtn.style.cssText = 'font-size:11px;padding:2px 8px;margin-left:4px;border:1px solid #c0daf0;border-radius:4px;background:#f0f8ff;color:#2196F3;cursor:pointer;vertical-align:middle;line-height:22px;white-space:nowrap;height:auto;width:auto;float:none;display:inline-block;';
            const fontGroup = fontPicker.closest('.ql-formats');
            if (fontGroup) fontGroup.appendChild(loadBtn);
            else toolbar.appendChild(loadBtn);

            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.ttf,.otf,.woff,.woff2';
            fileInput.multiple = true;
            fileInput.style.display = 'none';
            document.body.appendChild(fileInput);

            loadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                fileInput.click();
            });

            // 드롭다운 항목을 Quill 네이티브 방식으로 추가
            function addFontToDropdown(slug) {
                const item = document.createElement('span');
                item.tabIndex = 0;
                item.setAttribute('role', 'button');
                item.className = 'ql-picker-item';
                item.setAttribute('data-value', slug);
                item.addEventListener('click', function() {
                    // Quill picker 레이블 업데이트
                    const label = fontPicker.querySelector('.ql-picker-label');
                    label.setAttribute('data-value', slug);
                    fontPicker.classList.remove('ql-expanded');
                    // 에디터에 글꼴 적용
                    quill.focus();
                    const range = quill.getSelection(true);
                    if (range && range.length > 0) {
                        quill.formatText(range.index, range.length, 'font', slug, Quill.sources.USER);
                    } else {
                        quill.format('font', slug, Quill.sources.USER);
                    }
                });
                opts.appendChild(item);
            }

            // 이미 저장된 커스텀 글꼴들의 드롭다운 항목 추가
            _customFonts.forEach(f => addFontToDropdown(f.slug));

            if (_customFonts.length > 0) {
                loadBtn.textContent = '글꼴 추가 (+' + _customFonts.length + ')';
                loadBtn.style.color = '#4CAF50';
                loadBtn.style.borderColor = '#4CAF50';
            }

            const existingValues = new Set(Font.whitelist || []);

            fileInput.addEventListener('change', function() {
                const files = this.files;
                if (!files || files.length === 0) return;
                let pending = files.length;

                Array.from(files).forEach(file => {
                    const name = file.name.replace(/\.(ttf|otf|woff2?|TTF|OTF|WOFF2?)$/i, '');
                    const familyName = name.replace(/[-_]/g, ' ');
                    const slug = name.toLowerCase().replace(/[^a-z0-9\uac00-\ud7a3]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
                    if (!slug || existingValues.has(slug)) { pending--; return; }

                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const dataUrl = ev.target.result;
                        const esc = familyName.replace(/'/g, "\\'");

                        // @font-face + CSS 추가
                        const styleEl = document.createElement('style');
                        styleEl.textContent =
                            `@font-face { font-family: '${esc}'; src: url('${dataUrl}'); font-display: swap; }\n` +
                            `.ql-font-${CSS.escape(slug)} { font-family: '${esc}', sans-serif; }\n` +
                            `.ql-snow .ql-picker.ql-font .ql-picker-label[data-value="${slug}"]::before,\n` +
                            `.ql-snow .ql-picker.ql-font .ql-picker-item[data-value="${slug}"]::before { content: '${esc}'; font-family: '${esc}', sans-serif; }\n`;
                        document.head.appendChild(styleEl);

                        // Quill whitelist 등록
                        Font.whitelist.push(slug);
                        existingValues.add(slug);

                        // 드롭다운 항목 추가
                        addFontToDropdown(slug);

                        // localStorage에 저장
                        _customFonts.push({ slug, family: familyName, dataUrl });
                        try { localStorage.setItem(_CUSTOM_FONTS_KEY, JSON.stringify(_customFonts)); } catch(e) {}

                        loadBtn.textContent = '글꼴 추가 (+' + _customFonts.length + ')';
                        loadBtn.style.color = '#4CAF50';
                        loadBtn.style.borderColor = '#4CAF50';
                    };
                    reader.readAsDataURL(file);
                });
                this.value = '';
            });
        })();

        const charCount = document.getElementById('char-count');

        // 글자 수 (디바운스)
        let _charTimer = null;
        quill.on('text-change', () => {
            clearTimeout(_charTimer);
            _charTimer = setTimeout(() => {
                charCount.textContent = quill.getText().replace(/\n/g, '').length.toLocaleString();
            }, 300);
        });

        // 이미지 붙여넣기/드롭 시 base64로 삽입 (기본 동작)
        // Tab 키로 들여쓰기
        quill.keyboard.addBinding({ key: 'Tab' }, function(range) {
            quill.formatLine(range.index, 1, 'indent', '+1');
            return false;
        });

        // Ctrl+S 저장 단축키
        quill.keyboard.addBinding({ key: 'S', shortKey: true }, function() {
            document.getElementById('save-btn').click();
            return false;
        });

        // ESC로 전체화면 해제
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.body.classList.contains('editor-fullscreen')) {
                document.body.classList.remove('editor-fullscreen');
                const btn = document.querySelector('.ql-fullscreen');
                if (btn) btn.classList.remove('ql-active');
            }
        });

        // ── 저장 위치 옵션 갱신 ──
        function refreshLocationOptions() {
            const sel = document.getElementById('save-location');
            sel.innerHTML = '<option value="">전체</option>';
            if (window.sidebarTree) {
                window.sidebarTree.getContainers().forEach(c => {
                    sel.innerHTML += '<option value="' + c.id + '">' + c.indent + c.name + '</option>';
                });
            }
        }
        setTimeout(refreshLocationOptions, 500);
        document.getElementById('save-location').addEventListener('focus', refreshLocationOptions);

        // ── 수정 모드 지원 ──
        let editingNovelId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('edit')) {
            editingNovelId = urlParams.get('edit');
            (async () => {
                const { data, error } = await sb.from('novels').select('*').eq('id', editingNovelId).single();
                if (!error && data) {
                    let title = data.title || '';
                    let subtitle = data.subtitle || '';
                    let content = data.content || '';

                    // 본문 앞부분에 제목/부제목이 포함되어 있으면 분리
                    if (!subtitle || title === '제목 없음') {
                        const tmp = document.createElement('div');
                        tmp.innerHTML = content;
                        const children = Array.from(tmp.childNodes);
                        let extracted = 0;

                        if (children.length > 0) {
                            const first = children[0];
                            const firstText = (first.textContent || '').trim();
                            // 첫 번째 요소가 제목일 가능성 (h1, h2, 또는 "제목 : " 접두사)
                            if (first.tagName === 'H1' || first.tagName === 'H2' || firstText.indexOf('제목 : ') === 0) {
                                if (!title || title === '제목 없음') {
                                    title = firstText.indexOf('제목 : ') === 0 ? firstText.substring('제목 : '.length).trim() : firstText;
                                }
                                first.remove();
                                extracted++;
                            }
                        }

                        const remaining = Array.from(tmp.childNodes);
                        if (remaining.length > 0 && !subtitle) {
                            const second = remaining[0];
                            const secondText = (second.textContent || '').trim();
                            if (second.tagName === 'H3' || second.tagName === 'H4' || secondText.indexOf('부제목 : ') === 0) {
                                subtitle = secondText.indexOf('부제목 : ') === 0 ? secondText.substring('부제목 : '.length).trim() : secondText;
                                second.remove();
                                extracted++;
                            }
                        }

                        // 빈 줄 제거
                        if (extracted > 0) {
                            const first = tmp.firstChild;
                            if (first && first.tagName === 'P' && !(first.textContent || '').trim() && !first.querySelector('img')) {
                                first.remove();
                            }
                            content = tmp.innerHTML;
                        }
                    }

                    document.getElementById('novel-title').value = title;
                    document.getElementById('novel-subtitle').value = subtitle;
                    // 히스토리 비활성화 후 콘텐츠 로드 (대용량 문서 렉 방지)
                    quill.history.clear();
                    quill.root.innerHTML = content;
                    charCount.textContent = quill.getText().replace(/\n/g, '').length.toLocaleString();
                    document.getElementById('save-btn').textContent = '수정 저장';

                    // 본문에서 제목/부제목을 추출했으면 DB에 반영
                    if (title !== (data.title || '') || subtitle !== (data.subtitle || '')) {
                        const updateData = { title: title };
                        if (subtitle) updateData.subtitle = subtitle;
                        if (content !== (data.content || '')) updateData.content = content;
                        sb.from('novels').update(updateData).eq('id', editingNovelId).then(() => {
                            if (window.sidebarTree) window.sidebarTree.updateNovelTitle(editingNovelId, title);
                        });
                    }
                } else {
                    editingNovelId = null;
                }
            })();
        }

        function findNodeInTree(nodes, id) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) return nodes[i];
                if (nodes[i].children) {
                    const found = findNodeInTree(nodes[i].children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ── 저장 ──
        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = '저장 중...';

            const { data: { session } } = await sb.auth.getSession();
            const title = document.getElementById('novel-title').value || '제목 없음';
            const subtitle = document.getElementById('novel-subtitle').value || '';
            const content = quill.root.innerHTML;

            if (editingNovelId) {
                const updateData = { title: title, content: content };
                if (subtitle) updateData.subtitle = subtitle;
                let { error } = await sb.from('novels').update(updateData).eq('id', editingNovelId);
                if (error && updateData.subtitle !== undefined) {
                    delete updateData.subtitle;
                    ({ error } = await sb.from('novels').update(updateData).eq('id', editingNovelId));
                }

                if (error) {
                    btn.textContent = '저장 실패';
                } else {
                    document.getElementById('save-status').textContent = '수정됨 ' + new Date().toLocaleTimeString();
                    // 사이드바 제목 동기화
                    if (window.sidebarTree) {
                        window.sidebarTree.updateNovelTitle(editingNovelId, title);
                    }
                    window.dispatchEvent(new CustomEvent('novels-changed'));
                    // 초기 상태로 리셋
                    editingNovelId = null;
                    document.getElementById('novel-title').value = '';
                    document.getElementById('novel-subtitle').value = '';
                    quill.setContents([]);
                    charCount.textContent = '0';
                    btn.textContent = '저장';
                    // URL에서 edit 파라미터 제거
                    history.replaceState(null, '', window.location.pathname);
                }
            } else {
                const locationId = document.getElementById('save-location').value || null;

                // 같은 제목+부제목+같은 폴더에 기존 소설이 있으면 이어붙이기
                let existingId = null;
                if (window.sidebarTree) {
                    const tree = window.sidebarTree.getTree();
                    const parentNode = locationId ? findNodeInTree(tree, locationId) : findNodeInTree(tree, '_all');
                    if (parentNode && parentNode.children) {
                        for (let i = 0; i < parentNode.children.length; i++) {
                            const child = parentNode.children[i];
                            if (child.id && child.id.indexOf('novel_') === 0 && child.name === title) {
                                existingId = child.id.replace('novel_', '');
                                break;
                            }
                        }
                    }
                }

                if (existingId) {
                    // 기존 소설의 subtitle도 확인
                    const { data: existingData } = await sb.from('novels').select('subtitle, content').eq('id', existingId).single();
                    if (existingData && (existingData.subtitle || '') === subtitle) {
                        // 이어붙이기
                        const merged = (existingData.content || '') + '<p><br></p>' + content;
                        const updateData = { content: merged };
                        let { error } = await sb.from('novels').update(updateData).eq('id', existingId);
                        if (error) {
                            btn.textContent = '저장 실패';
                        } else {
                            document.getElementById('save-status').textContent = '이어붙이기 완료 ' + new Date().toLocaleTimeString();
                            document.getElementById('novel-title').value = '';
                            document.getElementById('novel-subtitle').value = '';
                            quill.setContents([]);
                            charCount.textContent = '0';
                            btn.textContent = '저장';
                        }
                    } else {
                        existingId = null; // subtitle이 다르면 새로 생성
                    }
                }

                if (!existingId) {
                    const novel = {
                        user_id: session.user.id,
                        title: title,
                        content: content,
                        status: 'draft',
                        created_at: new Date().toISOString()
                    };
                    if (subtitle) novel.subtitle = subtitle;

                    let { data, error } = await sb.from('novels').insert([novel]).select();
                    if (error && novel.subtitle !== undefined) {
                        delete novel.subtitle;
                        ({ data, error } = await sb.from('novels').insert([novel]).select());
                    }
                    if (error) {
                        btn.textContent = '저장 실패';
                    } else {
                        const novelId = data && data[0] ? data[0].id : Date.now();
                        if (window.sidebarTree) {
                            window.sidebarTree.addNovelNode(locationId, novelId, title, subtitle);
                        }
                        document.getElementById('save-status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
                        document.getElementById('novel-title').value = '';
                        document.getElementById('novel-subtitle').value = '';
                        quill.setContents([]);
                        charCount.textContent = '0';
                        btn.textContent = '저장';
                    }
                }
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
