<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 작성 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
    <style>
        .editor-status { display: flex; justify-content: space-between; padding: 4px 12px; color: #7a9ab5; font-size: 0.78rem; border-top: 1px solid #e8f2fb; flex-shrink: 0; }
        .save-location-select { border: 1px solid #d0e3f2; border-radius: 6px; padding: 4px 8px; font-size: 0.82rem; color: #5a7a9a; background: #fff; outline: none; cursor: pointer; max-width: 160px; }

        /* Quill 에디터 커스텀 */
        .write-body .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid #e8f2fb; background: #f7fbff; padding: 8px 12px; }
        .write-body .ql-container.ql-snow { border: none; flex: 1; overflow-y: auto; font-size: 11pt; }
        .write-body .ql-editor { line-height: 2; color: #2c3e50; padding: 24px 32px; min-height: 100%; }
        .write-body .ql-editor.ql-blank::before { color: #b0cbde; font-style: normal; }
        .write-body .ql-editor:focus.ql-blank::before { display: none; }
        .write-body .ql-snow .ql-stroke { stroke: #5a7a9a; }
        .write-body .ql-snow .ql-fill { fill: #5a7a9a; }
        .write-body .ql-snow .ql-picker { color: #5a7a9a; }
        .write-body .ql-snow button:hover .ql-stroke,
        .write-body .ql-snow button.ql-active .ql-stroke { stroke: #3a9ad9; }
        .write-body .ql-snow button:hover .ql-fill,
        .write-body .ql-snow button.ql-active .ql-fill { fill: #3a9ad9; }
        .write-body .ql-snow .ql-picker-label:hover,
        .write-body .ql-snow .ql-picker-label.ql-active { color: #3a9ad9; }
        .write-body .ql-editor blockquote { border-left: 3px solid #3a9ad9; padding-left: 1em; color: #5a7a9a; }
        .write-body .ql-editor table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        .write-body .ql-editor table td { border: 1px solid #d0e3f2; padding: 8px 12px; }
        .write-body .ql-editor img { max-width: 100%; height: auto; border-radius: 4px; }
        .write-body .ql-editor hr { border: none; border-top: 1px solid #d0e3f2; margin: 1.5em 0; }

        /* 글씨체 매핑 */
        .ql-font-malgun-gothic { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }
        .ql-font-noto-sans-kr { font-family: 'Noto Sans KR', sans-serif; }
        .ql-font-nanum-gothic { font-family: 'Nanum Gothic', sans-serif; }
        .ql-font-nanum-myeongjo { font-family: 'Nanum Myeongjo', serif; }
        .ql-font-georgia { font-family: Georgia, serif; }
        .ql-font-monospace { font-family: monospace; }
        .ql-font-arial { font-family: Arial, Helvetica, sans-serif; }
        .ql-font-times-new-roman { font-family: 'Times New Roman', Times, serif; }

        /* 글씨체 드롭다운 레이블 */
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="malgun-gothic"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="malgun-gothic"]::before { content: '맑은 고딕'; font-family: 'Malgun Gothic', sans-serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="noto-sans-kr"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="noto-sans-kr"]::before { content: 'Noto Sans'; font-family: 'Noto Sans KR', sans-serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="nanum-gothic"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="nanum-gothic"]::before { content: '나눔고딕'; font-family: 'Nanum Gothic', sans-serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="nanum-myeongjo"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="nanum-myeongjo"]::before { content: '나눔명조'; font-family: 'Nanum Myeongjo', serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="georgia"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="georgia"]::before { content: 'Georgia'; font-family: Georgia, serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="monospace"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="monospace"]::before { content: 'Monospace'; font-family: monospace; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="arial"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="arial"]::before { content: 'Arial'; font-family: Arial, sans-serif; }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="times-new-roman"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="times-new-roman"]::before { content: 'Times New Roman'; font-family: 'Times New Roman', serif; }

        /* 글씨 크기 드롭다운 */
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="9pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="9pt"]::before { content: '9pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="10pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="10pt"]::before { content: '10pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="11pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="11pt"]::before { content: '11pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="12pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="12pt"]::before { content: '12pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="14pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="14pt"]::before { content: '14pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="16pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="16pt"]::before { content: '16pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="18pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="18pt"]::before { content: '18pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="20pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="20pt"]::before { content: '20pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="24pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="24pt"]::before { content: '24pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="28pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="28pt"]::before { content: '28pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="36pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="36pt"]::before { content: '36pt'; }
        .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="48pt"]::before,
        .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="48pt"]::before { content: '48pt'; }

        /* 줄간격 드롭다운 */
        .ql-snow .ql-picker.ql-lineHeight { width: 65px; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label::before { content: '줄간격'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="1"]::before { content: '1.0'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="1.2"]::before { content: '1.2'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="1.5"]::before { content: '1.5'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="1.8"]::before { content: '1.8'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="2"]::before { content: '2.0'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="2.5"]::before { content: '2.5'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-item[data-value="3"]::before { content: '3.0'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="1"]::before { content: '1.0'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="1.2"]::before { content: '1.2'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="1.5"]::before { content: '1.5'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="1.8"]::before { content: '1.8'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="2"]::before { content: '2.0'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="2.5"]::before { content: '2.5'; }
        .ql-snow .ql-picker.ql-lineHeight .ql-picker-label[data-value="3"]::before { content: '3.0'; }

        /* 구분선 버튼 커스텀 */
        .ql-divider svg { width: 18px; height: 18px; }
        .ql-fullscreen svg { width: 18px; height: 18px; }

        /* 전체화면 모드 */
        body.editor-fullscreen { overflow: hidden; }
        body.editor-fullscreen .navbar,
        body.editor-fullscreen .page-nav,
        body.editor-fullscreen .sidebar,
        body.editor-fullscreen .sidebar-toggle,
        body.editor-fullscreen .write-header { display: none !important; }
        body.editor-fullscreen main { margin-left: 0 !important; width: 100% !important; }
        body.editor-fullscreen .write-section { height: 100vh !important; }
        body.editor-fullscreen .write-body { height: 100vh; }
    </style>
</head>
<body class="write-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <nav class="page-nav" id="page-nav">
            <a href="write.html" class="page-nav-item active">작성</a>
            <a href="viewer.html" class="page-nav-item">뷰어</a>
            <a href="manage.html" class="page-nav-item">관리</a>
            <a href="translate.html" class="page-nav-item">DeepL</a>
        </nav>
        <section class="write-section">
            <div class="write-header">
                <input type="text" class="write-title-input" id="novel-title" placeholder="제목" required>
                <select id="save-location" class="save-location-select" title="저장 위치">
                    <option value="">전체</option>
                </select>
                <button class="write-save-btn" id="save-btn">저장</button>
            </div>
            <div class="write-header" style="border-bottom: 1px solid #e8f2fb; padding-top:0;">
                <input type="text" class="write-subtitle-input" id="novel-subtitle" placeholder="부제목 (선택)">
            </div>

            <div class="write-body">
                <div id="editor-container"></div>
                <div class="editor-status">
                    <span><span id="char-count">0</span>자</span>
                    <span id="save-status"></span>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) window.location.href = 'login.html';
        })();

        // ── Quill 모듈 등록 ──
        const Font = Quill.import('attributors/class/font');
        Font.whitelist = ['malgun-gothic', 'noto-sans-kr', 'nanum-gothic', 'nanum-myeongjo', 'georgia', 'monospace', 'arial', 'times-new-roman'];
        Quill.register(Font, true);

        const Size = Quill.import('attributors/style/size');
        Size.whitelist = ['9pt', '10pt', '11pt', '12pt', '14pt', '16pt', '18pt', '20pt', '24pt', '28pt', '36pt', '48pt'];
        Quill.register(Size, true);

        // ── 줄간격 ──
        const Parchment = Quill.import('parchment');
        const LineHeightStyle = new Parchment.StyleAttributor('lineHeight', 'line-height', {
            scope: Parchment.Scope.BLOCK,
            whitelist: ['1', '1.2', '1.5', '1.8', '2', '2.5', '3']
        });
        Quill.register(LineHeightStyle, true);

        // ── 구분선(HR) 블롯 ──
        const BlockEmbed = Quill.import('blots/block/embed');
        class DividerBlot extends BlockEmbed {
            static blotName = 'divider';
            static tagName = 'hr';
        }
        Quill.register(DividerBlot);

        // ── 커스텀 툴바 아이콘 ──
        const icons = Quill.import('ui/icons');
        icons['divider'] = '<svg viewBox="0 0 18 18"><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="2"/></svg>';
        icons['insertTable'] = '<svg viewBox="0 0 18 18"><rect x="2" y="2" width="14" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="7" x2="16" y2="7" stroke="currentColor" stroke-width="1"/><line x1="2" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1"/><line x1="7" y1="2" x2="7" y2="16" stroke="currentColor" stroke-width="1"/><line x1="12" y1="2" x2="12" y2="16" stroke="currentColor" stroke-width="1"/></svg>';
        icons['fullscreen'] = '<svg viewBox="0 0 18 18"><path d="M2 6V2h4M12 2h4v4M16 12v4h-4M6 16H2v-4" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>';

        // ── Quill 에디터 초기화 ──
        const toolbarOptions = {
            container: [
                [{ 'header': [1, 2, 3, 4, false] }],
                [{ 'font': ['', 'malgun-gothic', 'noto-sans-kr', 'nanum-gothic', 'nanum-myeongjo', 'georgia', 'monospace', 'arial', 'times-new-roman'] }],
                [{ 'size': ['9pt', '10pt', '11pt', false, '14pt', '16pt', '18pt', '20pt', '24pt', '28pt', '36pt', '48pt'] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'script': 'sub' }, { 'script': 'super' }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                [{ 'indent': '-1' }, { 'indent': '+1' }],
                [{ 'align': [] }],
                [{ 'lineHeight': ['1', '1.2', '1.5', '1.8', '2', '2.5', '3'] }],
                ['blockquote', 'code-block'],
                ['divider', 'insertTable'],
                ['link', 'image', 'video'],
                ['clean', 'fullscreen']
            ],
            handlers: {
                'divider': function() {
                    const range = this.quill.getSelection(true);
                    this.quill.insertText(range.index, '\n', Quill.sources.USER);
                    this.quill.insertEmbed(range.index + 1, 'divider', true, Quill.sources.USER);
                    this.quill.setSelection(range.index + 2, Quill.sources.SILENT);
                },
                'insertTable': function() {
                    const q = this.quill;
                    const savedRange = q.getSelection(true);
                    // 모달로 행/열 입력
                    const overlay = document.createElement('div');
                    overlay.className = 'modal-overlay';
                    overlay.innerHTML =
                        '<div class="modal-dialog" style="max-width:280px;">' +
                            '<div class="modal-title">표 삽입</div>' +
                            '<label style="display:block;margin-bottom:8px;font-size:0.85rem;color:#5a7a9a;">행 수</label>' +
                            '<input type="number" id="table-rows" value="3" min="1" max="20" style="width:100%;padding:6px 10px;border:1px solid #d0e3f2;border-radius:6px;margin-bottom:12px;font-size:0.9rem;">' +
                            '<label style="display:block;margin-bottom:8px;font-size:0.85rem;color:#5a7a9a;">열 수</label>' +
                            '<input type="number" id="table-cols" value="3" min="1" max="20" style="width:100%;padding:6px 10px;border:1px solid #d0e3f2;border-radius:6px;margin-bottom:16px;font-size:0.9rem;">' +
                            '<div style="display:flex;justify-content:flex-end;gap:8px;">' +
                                '<button id="table-cancel" class="modal-btn-cancel" style="padding:6px 16px;border:1px solid #d0e3f2;border-radius:6px;background:#fff;color:#5a7a9a;cursor:pointer;">취소</button>' +
                                '<button id="table-confirm" class="modal-btn-ok" style="padding:6px 16px;border:none;border-radius:6px;background:#3a9ad9;color:#fff;cursor:pointer;">삽입</button>' +
                            '</div>' +
                        '</div>';
                    document.body.appendChild(overlay);
                    document.getElementById('table-rows').focus();
                    document.getElementById('table-cancel').addEventListener('click', () => overlay.remove());
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
                    document.getElementById('table-confirm').addEventListener('click', () => {
                        const r = parseInt(document.getElementById('table-rows').value) || 3;
                        const c = parseInt(document.getElementById('table-cols').value) || 3;
                        overlay.remove();
                        let html = '<table><tbody>';
                        for (let i = 0; i < r; i++) {
                            html += '<tr>';
                            for (let j = 0; j < c; j++) html += '<td><br></td>';
                            html += '</tr>';
                        }
                        html += '</tbody></table>';
                        const idx = savedRange ? savedRange.index : q.getLength() - 1;
                        q.clipboard.dangerouslyPasteHTML(idx, html, Quill.sources.USER);
                    });
                },
                'fullscreen': function() {
                    document.body.classList.toggle('editor-fullscreen');
                    const btn = document.querySelector('.ql-fullscreen');
                    if (btn) btn.classList.toggle('ql-active', document.body.classList.contains('editor-fullscreen'));
                }
            }
        };

        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: '내용을 입력하세요...',
            modules: {
                toolbar: toolbarOptions,
                history: { delay: 1000, maxStack: 200, userOnly: true }
            }
        });

        // 툴바 클릭 시 에디터 포커스 유지 (더블클릭 방지)
        document.querySelector('.ql-toolbar').addEventListener('mousedown', function(e) {
            e.preventDefault();
        });

        const charCount = document.getElementById('char-count');

        // 글자 수
        quill.on('text-change', () => {
            charCount.textContent = quill.getText().replace(/\n/g, '').length.toLocaleString();
        });

        // 이미지 붙여넣기/드롭 시 base64로 삽입 (기본 동작)
        // Tab 키로 들여쓰기
        quill.keyboard.addBinding({ key: 'Tab' }, function(range) {
            quill.formatLine(range.index, 1, 'indent', '+1');
            return false;
        });

        // Ctrl+S 저장 단축키
        quill.keyboard.addBinding({ key: 'S', shortKey: true }, function() {
            document.getElementById('save-btn').click();
            return false;
        });

        // ESC로 전체화면 해제
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.body.classList.contains('editor-fullscreen')) {
                document.body.classList.remove('editor-fullscreen');
                const btn = document.querySelector('.ql-fullscreen');
                if (btn) btn.classList.remove('ql-active');
            }
        });

        // ── 저장 위치 옵션 갱신 ──
        function refreshLocationOptions() {
            const sel = document.getElementById('save-location');
            sel.innerHTML = '<option value="">전체</option>';
            if (window.sidebarTree) {
                window.sidebarTree.getContainers().forEach(c => {
                    sel.innerHTML += '<option value="' + c.id + '">' + c.indent + c.name + '</option>';
                });
            }
        }
        setTimeout(refreshLocationOptions, 500);
        document.getElementById('save-location').addEventListener('focus', refreshLocationOptions);

        // ── 수정 모드 지원 ──
        let editingNovelId = null;
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('edit')) {
            editingNovelId = urlParams.get('edit');
            (async () => {
                const { data, error } = await sb.from('novels').select('*').eq('id', editingNovelId).single();
                if (!error && data) {
                    let title = data.title || '';
                    let subtitle = data.subtitle || '';
                    let content = data.content || '';

                    // 본문 앞부분에 제목/부제목이 포함되어 있으면 분리
                    if (!subtitle || title === '제목 없음') {
                        const tmp = document.createElement('div');
                        tmp.innerHTML = content;
                        const children = Array.from(tmp.childNodes);
                        let extracted = 0;

                        if (children.length > 0) {
                            const first = children[0];
                            const firstText = (first.textContent || '').trim();
                            // 첫 번째 요소가 제목일 가능성 (h1, h2, 또는 "제목 : " 접두사)
                            if (first.tagName === 'H1' || first.tagName === 'H2' || firstText.indexOf('제목 : ') === 0) {
                                if (!title || title === '제목 없음') {
                                    title = firstText.indexOf('제목 : ') === 0 ? firstText.substring('제목 : '.length).trim() : firstText;
                                }
                                first.remove();
                                extracted++;
                            }
                        }

                        const remaining = Array.from(tmp.childNodes);
                        if (remaining.length > 0 && !subtitle) {
                            const second = remaining[0];
                            const secondText = (second.textContent || '').trim();
                            if (second.tagName === 'H3' || second.tagName === 'H4' || secondText.indexOf('부제목 : ') === 0) {
                                subtitle = secondText.indexOf('부제목 : ') === 0 ? secondText.substring('부제목 : '.length).trim() : secondText;
                                second.remove();
                                extracted++;
                            }
                        }

                        // 빈 줄 제거
                        if (extracted > 0) {
                            const first = tmp.firstChild;
                            if (first && first.tagName === 'P' && !(first.textContent || '').trim() && !first.querySelector('img')) {
                                first.remove();
                            }
                            content = tmp.innerHTML;
                        }
                    }

                    document.getElementById('novel-title').value = title;
                    document.getElementById('novel-subtitle').value = subtitle;
                    quill.clipboard.dangerouslyPasteHTML(content);
                    charCount.textContent = quill.getText().replace(/\n/g, '').length.toLocaleString();
                    document.getElementById('save-btn').textContent = '수정 저장';

                    // 본문에서 제목/부제목을 추출했으면 DB와 사이드바에도 반영
                    if (title !== (data.title || '') || subtitle !== (data.subtitle || '') || content !== (data.content || '')) {
                        const updateData = { title: title, content: content };
                        if (subtitle) updateData.subtitle = subtitle;
                        await sb.from('novels').update(updateData).eq('id', editingNovelId);
                        if (window.sidebarTree) {
                            window.sidebarTree.updateNovelTitle(editingNovelId, title);
                        }
                    }
                } else {
                    editingNovelId = null;
                }
            })();
        }

        function findNodeInTree(nodes, id) {
            for (let i = 0; i < nodes.length; i++) {
                if (nodes[i].id === id) return nodes[i];
                if (nodes[i].children) {
                    const found = findNodeInTree(nodes[i].children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ── 저장 ──
        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = '저장 중...';

            const { data: { session } } = await sb.auth.getSession();
            const title = document.getElementById('novel-title').value || '제목 없음';
            const subtitle = document.getElementById('novel-subtitle').value || '';
            const content = quill.root.innerHTML;

            if (editingNovelId) {
                const updateData = { title: title, content: content };
                if (subtitle) updateData.subtitle = subtitle;
                let { error } = await sb.from('novels').update(updateData).eq('id', editingNovelId);
                if (error && updateData.subtitle !== undefined) {
                    delete updateData.subtitle;
                    ({ error } = await sb.from('novels').update(updateData).eq('id', editingNovelId));
                }

                if (error) {
                    btn.textContent = '저장 실패';
                } else {
                    document.getElementById('save-status').textContent = '수정됨 ' + new Date().toLocaleTimeString();
                    // 사이드바 제목 동기화
                    if (window.sidebarTree) {
                        window.sidebarTree.updateNovelTitle(editingNovelId, title);
                    }
                    window.dispatchEvent(new CustomEvent('novels-changed'));
                    // 초기 상태로 리셋
                    editingNovelId = null;
                    document.getElementById('novel-title').value = '';
                    document.getElementById('novel-subtitle').value = '';
                    quill.setContents([]);
                    charCount.textContent = '0';
                    btn.textContent = '저장';
                    // URL에서 edit 파라미터 제거
                    history.replaceState(null, '', window.location.pathname);
                }
            } else {
                const locationId = document.getElementById('save-location').value || null;

                // 같은 제목+부제목+같은 폴더에 기존 소설이 있으면 이어붙이기
                let existingId = null;
                if (window.sidebarTree) {
                    const tree = window.sidebarTree.getTree();
                    const parentNode = locationId ? findNodeInTree(tree, locationId) : findNodeInTree(tree, '_all');
                    if (parentNode && parentNode.children) {
                        for (let i = 0; i < parentNode.children.length; i++) {
                            const child = parentNode.children[i];
                            if (child.id && child.id.indexOf('novel_') === 0 && child.name === title) {
                                existingId = child.id.replace('novel_', '');
                                break;
                            }
                        }
                    }
                }

                if (existingId) {
                    // 기존 소설의 subtitle도 확인
                    const { data: existingData } = await sb.from('novels').select('subtitle, content').eq('id', existingId).single();
                    if (existingData && (existingData.subtitle || '') === subtitle) {
                        // 이어붙이기
                        const merged = (existingData.content || '') + '<p><br></p>' + content;
                        const updateData = { content: merged };
                        let { error } = await sb.from('novels').update(updateData).eq('id', existingId);
                        if (error) {
                            btn.textContent = '저장 실패';
                        } else {
                            document.getElementById('save-status').textContent = '이어붙이기 완료 ' + new Date().toLocaleTimeString();
                            document.getElementById('novel-title').value = '';
                            document.getElementById('novel-subtitle').value = '';
                            quill.setContents([]);
                            charCount.textContent = '0';
                            btn.textContent = '저장';
                        }
                    } else {
                        existingId = null; // subtitle이 다르면 새로 생성
                    }
                }

                if (!existingId) {
                    const novel = {
                        user_id: session.user.id,
                        title: title,
                        content: content,
                        status: 'draft',
                        created_at: new Date().toISOString()
                    };
                    if (subtitle) novel.subtitle = subtitle;

                    let { data, error } = await sb.from('novels').insert([novel]).select();
                    if (error && novel.subtitle !== undefined) {
                        delete novel.subtitle;
                        ({ data, error } = await sb.from('novels').insert([novel]).select());
                    }
                    if (error) {
                        btn.textContent = '저장 실패';
                    } else {
                        const novelId = data && data[0] ? data[0].id : Date.now();
                        if (window.sidebarTree) {
                            window.sidebarTree.addNovelNode(locationId, novelId, title);
                        }
                        document.getElementById('save-status').textContent = '저장됨 ' + new Date().toLocaleTimeString();
                        document.getElementById('novel-title').value = '';
                        document.getElementById('novel-subtitle').value = '';
                        quill.setContents([]);
                        charCount.textContent = '0';
                        btn.textContent = '저장';
                    }
                }
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
