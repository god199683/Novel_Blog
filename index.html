<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel-Blog</title>
    <link rel="stylesheet" href="./css/style.css?v=1">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="logo">Novel-Blog</div>
        <nav id="auth-nav">
            <a href="login.html" class="nav-link">로그인</a>
        </nav>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1 id="main-title">당신만의 세계를<br>자유롭게 펼쳐보세요.</h1>
            <p id="main-subtitle">글에만 집중할 수 있는 쾌적한 환경을 제공합니다.</p>
            <div id="main-action">
                <a href="login.html" class="btn btn-primary">지금 시작하기</a>
            </div>
        </div>
    </main>

    <script>
        // 페이지 로드 후 실행
        window.addEventListener('load', async () => {
            // Supabase 연결 확인
            if (typeof window.supabaseClient === 'undefined') {
                console.error("config 파일 로드 실패!");
                return;
            }

            try {
                // 현재 사용자 정보 가져오기
                const { data: { user } } = await window.supabaseClient.auth.getUser();

                if (user) {
                    const nickname = user.user_metadata.display_name || "작가";
                    
                    // 1. 네비게이션 메뉴 변경
                    document.getElementById('auth-nav').innerHTML = `
                        <span><b>${nickname}</b>님</span>
                        <a href="#" id="logout-btn" class="nav-link" style="margin-left:15px;">로그아웃</a>
                    `;

                    // 2. 메인 화면 문구 변경
                    document.getElementById('main-title').innerHTML = `${nickname} 작가님,<br>환영합니다!`;
                    document.getElementById('main-action').innerHTML = `
                        <a href="manage.html" class="btn btn-primary">소설 관리하기</a>
                    `;

                    // 3. 로그아웃 기능
                    document.getElementById('logout-btn').onclick = async (e) => {
                        e.preventDefault();
                        await window.supabaseClient.auth.signOut();
                        location.reload();
                    };
                }
            } catch (err) {
                console.log("로그인 상태 확인 중 에러:", err);
            }
        });
    </script>
</body>
</html>
