<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소설 도구 | Novel_Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tools-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: calc(100vh - 120px); }

        /* 메인 탭 */
        .tools-tabs { display: flex; gap: 0; border-bottom: 1px solid #e8f2fb; background: #f7fbff; flex-shrink: 0; }
        .tools-tab { padding: 10px 24px; font-size: 0.88rem; color: #5a7a9a; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
        .tools-tab:hover { color: #3a9ad9; }
        .tools-tab.active { color: #3a9ad9; border-bottom-color: #3a9ad9; font-weight: 700; }

        .tools-body { flex: 1; overflow-y: auto; padding: 24px; }
        .tools-panel { display: none; }
        .tools-panel.active { display: block; }

        /* 공통 */
        .tools-textarea { width: 100%; padding: 14px; box-sizing: border-box; border: 1px solid #d0e3f2; border-radius: 8px; resize: none; font-size: 10.5pt; line-height: 1.8; color: #2c3e50; outline: none; font-family: inherit; transition: border-color 0.2s; }
        .tools-textarea:focus { border-color: #3a9ad9; }
        .tools-btn { padding: 10px 24px; border: none; border-radius: 6px; background: #3a9ad9; color: #fff; font-size: 0.88rem; cursor: pointer; font-family: inherit; font-weight: 600; transition: background 0.2s; }
        .tools-btn:hover { background: #2a7ab9; }
        .tools-btn-secondary { background: #2b579a; }
        .tools-btn-secondary:hover { background: #1e4178; }

        /* 경계 확인기 */
        .count-status { display: flex; gap: 24px; background: #f7fbff; padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; border: 1px solid #e8f2fb; font-size: 0.85rem; color: #5a7a9a; }
        .count-item b { color: #3a9ad9; }
        .sub-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
        .sub-tab { padding: 6px 14px; font-size: 0.8rem; background: #f0f4f8; border-radius: 6px; cursor: pointer; border: 1px solid #d0e3f2; color: #5a7a9a; font-family: inherit; transition: all 0.15s; }
        .sub-tab.active { background: #3a9ad9; color: #fff; border-color: #3a9ad9; }

        .viewer { display: flex; align-items: center; gap: 10px; background: #f7fbff; padding: 20px; border-radius: 10px; border: 1px solid #e8f2fb; margin-top: 16px; justify-content: center; }
        .char-group { display: flex; gap: 5px; }
        .char-unit { width: 45px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #d0e3f2; background: #fff; }
        .char-unit.last-part { background: #fff9db; border-color: #fab005; }
        .char-val { font-size: 18px; font-weight: bold; color: #2c3e50; }
        .char-idx { font-size: 10px; color: #aaa; margin-top: 4px; }
        .cut-line { width: 2px; height: 80px; background: #fab005; position: relative; margin: 0 10px; }
        .cut-line::after { content: '2만자 지점'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #fab005; font-weight: bold; white-space: nowrap; }

        /* 비교 분석기 */
        .diff-layout { display: flex; gap: 14px; margin-bottom: 12px; }
        .diff-box { flex: 1; }
        .diff-label { font-size: 0.82rem; font-weight: 700; margin-bottom: 6px; color: #5a7a9a; }
        .diff-result-area { margin-top: 16px; padding: 20px; background: #f7fbff; border: 1px solid #e8f2fb; border-radius: 8px; line-height: 1.9; white-space: pre-wrap; word-break: break-all; min-height: 80px; font-size: 10.5pt; color: #2c3e50; }
        ins { background: #e6ffec; color: #24292e; text-decoration: none; border-bottom: 2px solid #28a745; font-weight: bold; }
        del { background: #ffeef0; color: #b31d28; text-decoration: line-through; }
        .stat-msg { font-size: 0.82rem; color: #7a9ab5; margin-top: 10px; text-align: center; }
    </style>
</head>
<body class="write-page">
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Novel_Blog</a>
            <ul class="nav-links">
                <li><a href="login.html" class="login-btn">로그인</a></li>
                <li><a href="signup.html" class="signup-btn">회원가입</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <nav class="page-nav">
            <a href="write.html" class="page-nav-item">작성</a>
            <a href="viewer.html" class="page-nav-item">뷰어</a>
            <a href="manage.html" class="page-nav-item">관리</a>
            <a href="translate.html" class="page-nav-item">DeepL</a>
            <a href="novel-tools.html" class="page-nav-item active">도구</a>
        </nav>
        <section class="tools-section">
            <div class="tools-tabs">
                <button class="tools-tab active" data-panel="cut">2만자 경계 확인</button>
                <button class="tools-tab" data-panel="diff">텍스트 비교 분석</button>
            </div>
            <div class="tools-body">
                <!-- 경계 확인기 -->
                <div class="tools-panel active" id="panel-cut">
                    <div class="count-status">
                        <div class="count-item">공백 포함: <b id="totalWithSpace">0</b>자</div>
                        <div class="count-item">공백 제외: <b id="totalNoSpace">0</b>자</div>
                    </div>
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-mode="excluding">공백 제외 기준</button>
                        <button class="sub-tab" data-mode="including">공백 포함 기준</button>
                    </div>
                    <textarea class="tools-textarea" id="novelInput" style="height: 300px;" placeholder="소설 내용을 붙여넣으세요..."></textarea>
                    <button class="tools-btn" id="cutBtn" style="margin-top: 12px;">절단 지점 앞뒤 3글자 확인</button>
                    <div id="cutResult"></div>
                </div>

                <!-- 비교 분석기 -->
                <div class="tools-panel" id="panel-diff">
                    <div class="diff-layout">
                        <div class="diff-box">
                            <div class="diff-label">원본 텍스트 (Old)</div>
                            <textarea class="tools-textarea" id="oldText" style="height: 250px;" placeholder="수정 전 내용을 입력하세요..."></textarea>
                        </div>
                        <div class="diff-box">
                            <div class="diff-label">비교 대상 (New)</div>
                            <textarea class="tools-textarea" id="newText" style="height: 250px;" placeholder="수정 후 내용을 입력하세요..."></textarea>
                        </div>
                    </div>
                    <button class="tools-btn tools-btn-secondary" id="diffBtn">차이점 찾기</button>
                    <div class="diff-result-area" id="diffResult">텍스트를 입력하고 버튼을 누르면 비교 결과가 표시됩니다.</div>
                    <div class="stat-msg" id="diffStat"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            // 탭 전환
            let currentCutMode = 'excluding';
            const tabs = document.querySelectorAll('.tools-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.tools-panel').forEach(p => p.classList.remove('active'));
                    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
                });
            });

            // 서브탭 (공백 제외/포함)
            const subTabs = document.querySelectorAll('.sub-tab');
            subTabs.forEach(st => {
                st.addEventListener('click', () => {
                    currentCutMode = st.dataset.mode;
                    subTabs.forEach(s => s.classList.remove('active'));
                    st.classList.add('active');
                    document.getElementById('cutResult').innerHTML = '';
                });
            });

            // 글자 수 카운트
            const novelInput = document.getElementById('novelInput');
            novelInput.addEventListener('input', () => {
                const text = novelInput.value;
                document.getElementById('totalWithSpace').textContent = text.length.toLocaleString();
                document.getElementById('totalNoSpace').textContent = text.replace(/\s/g, '').length.toLocaleString();
            });

            function formatChar(c) {
                if (!c) return '-';
                if (c === ' ') return '<span style="color:#ccc;font-size:11px;">공백</span>';
                if (c === '\n') return '<span style="color:#ccc;font-size:11px;">줄바꿈</span>';
                return c;
            }

            // 절단 지점 확인
            document.getElementById('cutBtn').addEventListener('click', () => {
                const text = novelInput.value;
                const resultDiv = document.getElementById('cutResult');
                const target = 20000;
                if (!text) return;

                let cutIndex = -1;
                if (currentCutMode === 'excluding') {
                    let nonSpaceCount = 0;
                    for (let i = 0; i < text.length; i++) {
                        if (!/\s/.test(text[i])) nonSpaceCount++;
                        if (nonSpaceCount === target) { cutIndex = i; break; }
                    }
                } else {
                    if (text.length >= target) cutIndex = target - 1;
                }

                if (cutIndex !== -1) {
                    let html = '<div class="viewer"><div class="char-group">';
                    for (let i = cutIndex - 2; i <= cutIndex; i++) {
                        html += '<div class="char-unit last-part"><div class="char-val">' + formatChar(text[i]) + '</div><div class="char-idx">' + (i < 0 ? '-' : (currentCutMode === 'including' ? i + 1 : '전')) + '</div></div>';
                    }
                    html += '</div><div class="cut-line"></div><div class="char-group">';
                    for (let i = cutIndex + 1; i <= cutIndex + 3; i++) {
                        html += '<div class="char-unit"><div class="char-val">' + formatChar(text[i]) + '</div><div class="char-idx">' + (i >= text.length ? '-' : (currentCutMode === 'including' ? i + 1 : '후')) + '</div></div>';
                    }
                    html += '</div></div><div class="stat-msg">노란색 칸까지가 20,000자 지점입니다.</div>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="stat-msg" style="color:#dc2626;">글자 수가 부족합니다.</div>';
                }
            });

            // 비교 분석
            document.getElementById('diffBtn').addEventListener('click', () => {
                const oldStr = document.getElementById('oldText').value;
                const newStr = document.getElementById('newText').value;
                const resultArea = document.getElementById('diffResult');
                const statArea = document.getElementById('diffStat');

                if (oldStr === newStr) {
                    resultArea.innerHTML = '<div style="text-align:center;color:#28a745;">두 텍스트가 완벽하게 일치합니다.</div>';
                    statArea.textContent = '';
                    return;
                }

                const oldArr = [...oldStr];
                const newArr = [...newStr];
                let diffHtml = '';
                let diffCount = 0;

                const maxLen = Math.max(oldArr.length, newArr.length);
                for (let k = 0; k < maxLen; k++) {
                    if (oldArr[k] !== newArr[k]) {
                        if (newArr[k] !== undefined) {
                            diffHtml += '<ins>' + (newArr[k] === '\n' ? '\u21b5\n' : newArr[k]) + '</ins>';
                            diffCount++;
                        }
                    } else {
                        diffHtml += newArr[k];
                    }
                }

                resultArea.innerHTML = diffHtml;
                statArea.innerHTML = '원본: ' + oldStr.length.toLocaleString() + '자 / 대상: ' + newStr.length.toLocaleString() + '자<br><b>총 ' + diffCount.toLocaleString() + '개 지점에서 차이가 발견되었습니다.</b>';
            });
        })();
    </script>
</body>
</html>
